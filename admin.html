<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusHub Admin</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1520; font-family: sans-serif; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2d3f55; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = "https://vwrqdstapeguqjvlwrps.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Irsq6di1d317hycpvsD__A_YTQD60ra";
    const ADMIN_PASSWORD = "Aali@2025";

    async function sbFetch(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
        ...options,
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json", Prefer: "return=representation", ...(options.headers || {}) },
      });
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    }

    const ROOMS = ["general", "study", "announcements", "off-topic", "assignments"];

    function Admin() {
      const [authed, setAuthed] = useState(false);
      const [pass, setPass] = useState("");
      const [passErr, setPassErr] = useState("");
      const [tab, setTab] = useState("students");
      const [students, setStudents] = useState([]);
      const [messages, setMessages] = useState([]);
      const [loading, setLoading] = useState(false);
      const [search, setSearch] = useState("");
      const [roomFilter, setRoomFilter] = useState("all");
      const [confirm, setConfirm] = useState(null);

      useEffect(() => {
        if (!authed) return;
        loadAll();
      }, [authed]);

      async function loadAll() {
        setLoading(true);
        try {
          const [s, m] = await Promise.all([
            sbFetch("/profiles?order=created_at.desc"),
            sbFetch("/messages?order=created_at.desc&limit=200"),
          ]);
          setStudents(s);
          setMessages(m);
        } catch(e) {}
        setLoading(false);
      }

      async function deleteMessage(id) {
        try {
          await fetch(`${SUPABASE_URL}/rest/v1/messages?id=eq.${id}`, {
            method: "DELETE",
            headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
          });
          setMessages(prev => prev.filter(m => m.id !== id));
        } catch(e) {}
        setConfirm(null);
      }

      async function deleteStudent(id) {
        try {
          await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${id}`, {
            method: "DELETE",
            headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
          });
          setStudents(prev => prev.filter(s => s.id !== id));
          setMessages(prev => prev.filter(m => m.user_id !== id));
        } catch(e) {}
        setConfirm(null);
      }

      const timeStr = ts => new Date(ts).toLocaleString();
      const COLORS = ["#6C63FF","#FF6584","#43B89C","#F4A261","#4FC3F7"];

      function Avatar({ name, color, size=36 }) {
        return <div style={{ width:size, height:size, borderRadius:"50%", background:color||"#6C63FF", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontWeight:700, fontSize:size*0.33, flexShrink:0 }}>{name?.slice(0,2).toUpperCase()}</div>;
      }

      if (!authed) {
        return (
          <div style={{ minHeight:"100vh", background:"#0d1520", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
            <div style={{ background:"#111827", border:"1px solid #1e2d3d", borderRadius:20, padding:"36px 28px", width:"100%", maxWidth:340, textAlign:"center" }}>
              <div style={{ fontSize:44, marginBottom:10 }}>🔐</div>
              <h1 style={{ color:"#e2e8f0", fontWeight:800, fontSize:22, marginBottom:4 }}>Admin Access</h1>
              <p style={{ color:"#64748b", fontSize:13, marginBottom:24 }}>CampusHub Admin Dashboard</p>
              <input style={{ width:"100%", background:"#1e2a3a", border:"1px solid #2d3f55", borderRadius:10, padding:"11px 14px", color:"#e2e8f0", fontSize:14, outline:"none", marginBottom:10, display:"block" }}
                placeholder="Admin password" type="password" value={pass} onChange={e=>setPass(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"){ if(pass===ADMIN_PASSWORD){ setAuthed(true); } else { setPassErr("Wrong password!"); } } }} />
              {passErr && <div style={{ color:"#f87171", fontSize:13, marginBottom:10 }}>{passErr}</div>}
              <button style={{ width:"100%", background:"#6C63FF", border:"none", borderRadius:10, padding:12, color:"#fff", fontWeight:700, fontSize:15, cursor:"pointer" }}
                onClick={()=>{ if(pass===ADMIN_PASSWORD){ setAuthed(true); } else { setPassErr("Wrong password!"); } }}>
                Enter Dashboard
              </button>
            </div>
          </div>
        );
      }

      const filteredStudents = students.filter(s =>
        s.username?.toLowerCase().includes(search.toLowerCase()) ||
        s.student_id?.toLowerCase().includes(search.toLowerCase()) ||
        s.university?.toLowerCase().includes(search.toLowerCase()) ||
        s.department?.toLowerCase().includes(search.toLowerCase())
      );

      const filteredMessages = messages.filter(m =>
        (roomFilter === "all" || m.room === roomFilter) &&
        (m.content?.toLowerCase().includes(search.toLowerCase()) || m.username?.toLowerCase().includes(search.toLowerCase()))
      );

      const msgsByRoom = {};
      ROOMS.forEach(r => msgsByRoom[r] = messages.filter(m => m.room === r).length);

      return (
        <div style={{ minHeight:"100vh", background:"#0d1520" }}>
          {/* Header */}
          <div style={{ background:"#111827", borderBottom:"1px solid #1e2d3d", padding:"14px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:22 }}>🎓</span>
              <div>
                <div style={{ color:"#e2e8f0", fontWeight:800, fontSize:16 }}>CampusHub Admin</div>
                <div style={{ color:"#475569", fontSize:11 }}>Welcome, Muhammed Aali</div>
              </div>
            </div>
            <button style={{ background:"none", border:"1px solid #2d3f55", borderRadius:8, padding:"6px 12px", color:"#94a3b8", cursor:"pointer", fontSize:12 }}
              onClick={loadAll}>🔄 Refresh</button>
          </div>

          {/* Stats */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, padding:"16px 20px" }}>
            {[
              { label:"Total Students", value: students.length, icon:"👥", color:"#6C63FF" },
              { label:"Total Messages", value: messages.length, icon:"💬", color:"#43B89C" },
              { label:"Active Rooms", value: ROOMS.filter(r => msgsByRoom[r] > 0).length, icon:"🏠", color:"#F4A261" },
            ].map(stat => (
              <div key={stat.label} style={{ background:"#111827", border:"1px solid #1e2d3d", borderRadius:14, padding:"14px 12px", textAlign:"center" }}>
                <div style={{ fontSize:24 }}>{stat.icon}</div>
                <div style={{ color: stat.color, fontWeight:800, fontSize:22, marginTop:4 }}>{stat.value}</div>
                <div style={{ color:"#475569", fontSize:10, marginTop:2 }}>{stat.label}</div>
              </div>
            ))}
          </div>

          {/* Room Stats */}
          <div style={{ padding:"0 20px 16px" }}>
            <div style={{ background:"#111827", border:"1px solid #1e2d3d", borderRadius:14, padding:14 }}>
              <div style={{ color:"#475569", fontSize:11, fontWeight:700, letterSpacing:1, marginBottom:10 }}>MESSAGES PER ROOM</div>
              {ROOMS.map(r => (
                <div key={r} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                  <div style={{ color:"#94a3b8", fontSize:12, width:100 }}>#{r}</div>
                  <div style={{ flex:1, background:"#1e2a3a", borderRadius:4, height:8 }}>
                    <div style={{ background:"#6C63FF", borderRadius:4, height:8, width: `${messages.length ? (msgsByRoom[r]/messages.length)*100 : 0}%`, transition:"width 0.3s" }} />
                  </div>
                  <div style={{ color:"#6C63FF", fontSize:12, fontWeight:700, width:24, textAlign:"right" }}>{msgsByRoom[r]}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Tabs */}
          <div style={{ padding:"0 20px 12px", display:"flex", gap:8 }}>
            {["students","messages"].map(t => (
              <button key={t} style={{ padding:"8px 20px", borderRadius:10, border:"none", cursor:"pointer", fontSize:13, fontWeight:700,
                background: tab===t ? "#6C63FF" : "#111827", color: tab===t ? "#fff" : "#64748b" }}
                onClick={()=>setTab(t)}>
                {t === "students" ? `👥 Students (${students.length})` : `💬 Messages (${messages.length})`}
              </button>
            ))}
          </div>

          {/* Search */}
          <div style={{ padding:"0 20px 12px", display:"flex", gap:8 }}>
            <input style={{ flex:1, background:"#111827", border:"1px solid #2d3f55", borderRadius:10, padding:"10px 14px", color:"#e2e8f0", fontSize:13, outline:"none" }}
              placeholder={tab==="students" ? "Search by name, ID, university..." : "Search messages..."}
              value={search} onChange={e=>setSearch(e.target.value)} />
            {tab==="messages" && (
              <select style={{ background:"#111827", border:"1px solid #2d3f55", borderRadius:10, padding:"10px 12px", color:"#e2e8f0", fontSize:13, outline:"none" }}
                value={roomFilter} onChange={e=>setRoomFilter(e.target.value)}>
                <option value="all">All Rooms</option>
                {ROOMS.map(r => <option key={r} value={r}>#{r}</option>)}
              </select>
            )}
          </div>

          {/* Content */}
          <div style={{ padding:"0 20px 80px" }}>
            {loading ? (
              <div style={{ textAlign:"center", color:"#475569", padding:40 }}>Loading...</div>
            ) : tab === "students" ? (
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {filteredStudents.length === 0 && <div style={{ color:"#475569", textAlign:"center", padding:40 }}>No students found</div>}
                {filteredStudents.map(s => (
                  <div key={s.id} style={{ background:"#111827", border:"1px solid #1e2d3d", borderRadius:14, padding:14 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <Avatar name={s.username} color={s.avatar_color} size={44} />
                      <div style={{ flex:1 }}>
                        <div style={{ color:"#e2e8f0", fontWeight:700, fontSize:14 }}>{s.username}</div>
                        <div style={{ color:"#a89eff", fontSize:12 }}>{s.student_id}</div>
                        <div style={{ color:"#475569", fontSize:11, marginTop:2 }}>{s.university} · {s.department} · {s.level}</div>
                      </div>
                      <button style={{ background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:8, padding:"6px 10px", color:"#f87171", cursor:"pointer", fontSize:12 }}
                        onClick={()=>setConfirm({ type:"student", id:s.id, name:s.username })}>
                        🗑️ Remove
                      </button>
                    </div>
                    {s.phone && (
                      <a href={`https://wa.me/${s.phone.replace(/[^0-9]/g,'')}`} target="_blank"
                        style={{ display:"inline-block", marginTop:8, background:"#25D366", borderRadius:6, padding:"4px 10px", color:"#fff", fontSize:11, fontWeight:600, textDecoration:"none" }}>
                        💬 WhatsApp
                      </a>
                    )}
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {filteredMessages.length === 0 && <div style={{ color:"#475569", textAlign:"center", padding:40 }}>No messages found</div>}
                {filteredMessages.map(m => (
                  <div key={m.id} style={{ background:"#111827", border:"1px solid #1e2d3d", borderRadius:12, padding:12 }}>
                    <div style={{ display:"flex", alignItems:"flex-start", gap:8 }}>
                      <Avatar name={m.username} color={m.avatar_color} size={32} />
                      <div style={{ flex:1 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:2 }}>
                          <span style={{ color:"#a89eff", fontWeight:700, fontSize:12 }}>{m.username}</span>
                          <span style={{ background:"rgba(108,99,255,0.2)", color:"#a89eff", fontSize:10, padding:"1px 6px", borderRadius:4 }}>#{m.room}</span>
                          <span style={{ color:"#475569", fontSize:10 }}>{timeStr(m.created_at)}</span>
                        </div>
                        <div style={{ color:"#e2e8f0", fontSize:13 }}>{m.content}</div>
                      </div>
                      <button style={{ background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:6, padding:"4px 8px", color:"#f87171", cursor:"pointer", fontSize:11, flexShrink:0 }}
                        onClick={()=>setConfirm({ type:"message", id:m.id, name:m.content.slice(0,30) })}>
                        🗑️
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Confirm Dialog */}
          {confirm && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
              <div style={{ background:"#111827", border:"1px solid #2d3f55", borderRadius:20, padding:24, width:"100%", maxWidth:300, textAlign:"center" }}>
                <div style={{ fontSize:36, marginBottom:12 }}>⚠️</div>
                <h3 style={{ color:"#e2e8f0", marginBottom:8 }}>Are you sure?</h3>
                <p style={{ color:"#64748b", fontSize:13, marginBottom:20 }}>Delete "{confirm.name}"? This cannot be undone.</p>
                <div style={{ display:"flex", gap:10 }}>
                  <button style={{ flex:1, background:"#1e2a3a", border:"none", borderRadius:10, padding:10, color:"#94a3b8", cursor:"pointer" }}
                    onClick={()=>setConfirm(null)}>Cancel</button>
                  <button style={{ flex:1, background:"#ef4444", border:"none", borderRadius:10, padding:10, color:"#fff", fontWeight:700, cursor:"pointer" }}
                    onClick={()=> confirm.type==="message" ? deleteMessage(confirm.id) : deleteStudent(confirm.id)}>
                    Delete
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Admin />);
  </script>
</body>
</html>
