<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusHub</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --accent:    #238636;
      --accent-h:  #2ea043;
      --blue:      #1f6feb;
      --blue-h:    #388bfd;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --danger:    #da3633;
      --warning:   #d29922;
      --radius:    10px;
    }

    html, body, #root { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── AUTH SCREEN ── */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #0e2a1a 0%, var(--bg) 70%);
    }

    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 32px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo .icon {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
    }
    .auth-logo h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .auth-logo p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface2);
      padding: 4px;
      border-radius: 8px;
      margin-bottom: 24px;
    }
    .auth-tabs button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .auth-tabs button.active {
      background: var(--accent);
      color: #fff;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }
    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .form-group input,
    .form-group select {
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--blue);
    }
    .form-group select option { background: var(--surface2); }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-link {
      background: none;
      border: none;
      color: var(--blue-h);
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }
    .btn-link:hover { color: #fff; }

    .alert {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      line-height: 1.4;
    }
    .alert-error   { background: #2d1215; border: 1px solid var(--danger); color: #f85149; }
    .alert-success { background: #0d2a17; border: 1px solid var(--accent); color: #56d364; }
    .alert-info    { background: #111d30; border: 1px solid var(--blue); color: var(--blue-h); }

    .auth-footer {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── MAIN APP ── */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* sidebar */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-header .logo-text {
      font-weight: 700;
      font-size: 16px;
    }
    .sidebar-header .logo-text span { color: var(--accent); }

    .sidebar-section {
      padding: 12px 10px 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .room-list { flex: 1; overflow-y: auto; padding: 0 8px; }
    .room-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
      transition: all .12s;
      margin-bottom: 2px;
    }
    .room-btn:hover { background: var(--surface2); color: var(--text); }
    .room-btn.active { background: var(--surface2); color: var(--text); font-weight: 600; }
    .room-btn .hash { color: var(--muted); font-size: 16px; line-height: 1; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #fff;
      flex-shrink: 0;
    }
    .user-name  { font-size: 13px; font-weight: 600; }
    .user-dept  { font-size: 11px; color: var(--muted); }
    .btn-signout {
      width: 100%;
      padding: 7px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all .12s;
    }
    .btn-signout:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

    /* chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header h2 { font-size: 16px; font-weight: 700; }
    .chat-header p  { font-size: 12px; color: var(--muted); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .message {
      display: flex;
      gap: 12px;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background .1s;
    }
    .message:hover { background: var(--surface2); }
    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; color: #fff;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-body {}
    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }
    .msg-sender { font-weight: 600; font-size: 14px; }
    .msg-time   { font-size: 11px; color: var(--muted); }
    .msg-text   { font-size: 14px; line-height: 1.5; word-break: break-word; }
    .wa-link    { color: #25d366; font-size: 12px; text-decoration: none; margin-left: 6px; }
    .wa-link:hover { text-decoration: underline; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 8px;
    }
    .empty-state .icon { font-size: 40px; }

    .chat-input-wrap {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 4px 4px 14px;
      align-items: center;
    }
    .chat-input-row input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 14px;
      outline: none;
      padding: 6px 0;
    }
    .send-btn {
      padding: 7px 18px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .12s;
    }
    .send-btn:hover { background: var(--accent-h); }
    .send-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── PRESENCE ── */
    .online-bar {
      padding: 8px 12px 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
    }
    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px #0d2a17;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .55; }
    }
    .online-label {
      font-size: 12px;
      color: #3fb950;
      font-weight: 600;
    }
    .online-names {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .room-btn .room-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .room-online-count {
      font-size: 10px;
      font-weight: 700;
      color: #3fb950;
      background: #0d2a17;
      border: 1px solid #238636;
      border-radius: 10px;
      padding: 0px 6px;
      min-width: 18px;
      text-align: center;
      line-height: 16px;
    }

    /* mobile */
    @media (max-width: 640px) {
      .sidebar { width: 200px; min-width: 200px; }
      .auth-card { padding: 24px 18px; }
      .form-row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { createClient } = supabase;
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = "https://vwrqdstapeguqjvlwrps.supabase.co";
const SUPABASE_KEY = "sb_publishable_Irsq6di1d317hycpvsD__A_YTQD60ra";
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const ROOMS = [
  { id: "general",       label: "General",       desc: "Open campus chat" },
  { id: "study-group",   label: "Study Group",   desc: "Study sessions & resources" },
  { id: "announcements", label: "Announcements", desc: "Official notices" },
  { id: "off-topic",     label: "Off-topic",     desc: "Anything goes 😄" },
  { id: "assignments",   label: "Assignments",   desc: "Help with coursework" },
];

const LEVELS = ["100L","200L","300L","400L","500L"];

function initials(name = "") {
  return name.split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase() || "?";
}
function avatarColor(str = "") {
  const colors = ["#1f6feb","#238636","#9e6a03","#8957e5","#e36209","#cf222e"];
  let h = 0; for (let c of str) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}
function fmtTime(ts) {
  if (!ts) return "";
  return new Date(ts).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
}
function waLink(phone) {
  if (!phone) return null;
  const clean = phone.replace(/\D/g, "");
  return `https://wa.me/${clean}`;
}

// ──────────── AUTH SCREEN ────────────
function AuthScreen({ onAuth }) {
  const [tab, setTab]         = useState("login"); // login | signup | forgot
  const [loading, setLoading] = useState(false);
  const [msg, setMsg]         = useState(null); // {type, text}

  // login fields
  const [loginEmail, setLoginEmail]       = useState("");
  const [loginPassword, setLoginPassword] = useState("");

  // signup fields
  const [form, setForm] = useState({
    fullName:"", email:"", password:"", confirmPassword:"",
    studentId:"", department:"", level:"100L", phone:""
  });

  // forgot
  const [forgotEmail, setForgotEmail] = useState("");

  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  async function handleLogin(e) {
    e.preventDefault(); setMsg(null); setLoading(true);
    const { error } = await sb.auth.signInWithPassword({ email: loginEmail, password: loginPassword });
    setLoading(false);
    if (error) return setMsg({ type:"error", text: error.message });
    onAuth();
  }

  async function handleSignup(e) {
    e.preventDefault(); setMsg(null);
    if (form.password !== form.confirmPassword)
      return setMsg({ type:"error", text: "Passwords don't match." });
    if (form.password.length < 6)
      return setMsg({ type:"error", text: "Password must be at least 6 characters." });
    setLoading(true);

    const { data, error } = await sb.auth.signUp({
      email: form.email,
      password: form.password,
      options: { data: { full_name: form.fullName } }
    });

    if (error) { setLoading(false); return setMsg({ type:"error", text: error.message }); }

    const uid = data?.user?.id;
    if (uid) {
      await sb.from("profiles").upsert({
        id:         uid,
        full_name:  form.fullName,
        student_id: form.studentId,
        department: form.department,
        level:      form.level,
        phone:      form.phone,
        updated_at: new Date().toISOString()
      });
    }
    setLoading(false);
    setMsg({ type:"success", text: "Account created! Check your email to confirm, then log in." });
    setTimeout(() => setTab("login"), 3000);
  }

  async function handleForgot(e) {
    e.preventDefault(); setMsg(null); setLoading(true);
    const { error } = await sb.auth.resetPasswordForEmail(forgotEmail, {
      redirectTo: window.location.origin
    });
    setLoading(false);
    if (error) return setMsg({ type:"error", text: error.message });
    setMsg({ type:"success", text: "Password reset link sent! Check your inbox." });
  }

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">
          <span className="icon">🎓</span>
          <h1>CampusHub</h1>
          <p>Your student community, all in one place</p>
        </div>

        {tab !== "forgot" && (
          <div className="auth-tabs">
            <button className={tab==="login"  ? "active" : ""} onClick={() => { setTab("login");  setMsg(null); }}>Log In</button>
            <button className={tab==="signup" ? "active" : ""} onClick={() => { setTab("signup"); setMsg(null); }}>Sign Up</button>
          </div>
        )}

        {msg && <div className={`alert alert-${msg.type}`} style={{marginBottom:16}}>{msg.text}</div>}

        {/* LOGIN */}
        {tab === "login" && (
          <form onSubmit={handleLogin}>
            <div className="form-grid">
              <div className="form-group">
                <label>Email</label>
                <input type="email" placeholder="you@university.edu" value={loginEmail}
                  onChange={e => setLoginEmail(e.target.value)} required />
              </div>
              <div className="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" value={loginPassword}
                  onChange={e => setLoginPassword(e.target.value)} required />
              </div>
              <button className="btn btn-primary" type="submit" disabled={loading}>
                {loading ? "Signing in…" : "Log In"}
              </button>
            </div>
            <div className="auth-footer" style={{marginTop:14}}>
              <button type="button" className="btn-link" onClick={() => { setTab("forgot"); setMsg(null); }}>
                Forgot password?
              </button>
            </div>
          </form>
        )}

        {/* SIGN UP */}
        {tab === "signup" && (
          <form onSubmit={handleSignup}>
            <div className="form-grid">
              <div className="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="e.g. Amaka Osei" value={form.fullName}
                  onChange={e => set("fullName", e.target.value)} required />
              </div>
              <div className="form-group">
                <label>Email</label>
                <input type="email" placeholder="you@university.edu" value={form.email}
                  onChange={e => set("email", e.target.value)} required />
              </div>
              <div className="form-row-2">
                <div className="form-group">
                  <label>Password</label>
                  <input type="password" placeholder="Min. 6 chars" value={form.password}
                    onChange={e => set("password", e.target.value)} required />
                </div>
                <div className="form-group">
                  <label>Confirm Password</label>
                  <input type="password" placeholder="Repeat password" value={form.confirmPassword}
                    onChange={e => set("confirmPassword", e.target.value)} required />
                </div>
              </div>
              <div className="form-row-2">
                <div className="form-group">
                  <label>Student ID</label>
                  <input type="text" placeholder="e.g. CST/2022/001" value={form.studentId}
                    onChange={e => set("studentId", e.target.value)} required />
                </div>
                <div className="form-group">
                  <label>Level</label>
                  <select value={form.level} onChange={e => set("level", e.target.value)}>
                    {LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label>Department / Course</label>
                <input type="text" placeholder="e.g. Computer Science" value={form.department}
                  onChange={e => set("department", e.target.value)} required />
              </div>
              <div className="form-group">
                <label>Phone (WhatsApp)</label>
                <input type="tel" placeholder="+2348012345678" value={form.phone}
                  onChange={e => set("phone", e.target.value)} />
              </div>
              <button className="btn btn-primary" type="submit" disabled={loading}>
                {loading ? "Creating account…" : "Create Account"}
              </button>
            </div>
          </form>
        )}

        {/* FORGOT PASSWORD */}
        {tab === "forgot" && (
          <form onSubmit={handleForgot}>
            <div style={{marginBottom:18, color:"var(--muted)", fontSize:13, lineHeight:1.5}}>
              Enter your email and we'll send a password reset link.
            </div>
            <div className="form-grid">
              <div className="form-group">
