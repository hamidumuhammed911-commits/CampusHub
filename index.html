<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusHub</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1520; font-family: sans-serif; }
    input, select, textarea { color: #e2e8f0 !important; }
    input::placeholder, textarea::placeholder { color: #64748b; }
    select option { background: #1e2a3a; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d1520; }
    ::-webkit-scrollbar-thumb { background: #2d3f55; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPABASE_URL = "https://vwrqdstapeguqjvlwrps.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Irsq6di1d317hycpvsD__A_YTQD60ra";
    const CLOUDINARY_CLOUD = "dybylicd7";
    const CLOUDINARY_PRESET = "campushub";

    async function uploadToCloudinary(file) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", CLOUDINARY_PRESET);
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
        method: "POST", body: formData,
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.secure_url;
    }

    async function sbFetch(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
        ...options,
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json", Prefer: "return=representation", ...(options.headers || {}) },
      });
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    }

    async function signUp(email, password) {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: "POST", headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || "Signup failed");
      return data;
    }

    async function signIn(email, password) {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: "POST", headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (data.error || data.error_code) throw new Error(data.error_description || "Login failed");
      return data;
    }

    async function resetPassword(email) {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
        method: "POST", headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      });
      return await res.json();
    }

    const ROOMS = [
      { id: "general", label: "general", emoji: "💬" },
      { id: "study", label: "study-group", emoji: "📚" },
      { id: "announcements", label: "announcements", emoji: "📢" },
      { id: "off-topic", label: "off-topic", emoji: "🎮" },
      { id: "assignments", label: "assignments", emoji: "📝" },
    ];

    const LEVELS = ["Jambite (Pre-university)", "100L", "200L", "300L", "400L", "500L", "Graduate"];
    const COLORS = ["#6C63FF","#FF6584","#43B89C","#F4A261","#4FC3F7","#FF8A65","#A29BFE"];
    const randomColor = () => COLORS[Math.floor(Math.random() * COLORS.length)];
    const timeStr = ts => new Date(ts).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });

    const INP = { width:"100%", background:"#1e2a3a", border:"1px solid #2d3f55", borderRadius:10, padding:"11px 14px", color:"#e2e8f0", fontSize:14, outline:"none", marginBottom:10, display:"block" };
    const BTN = { width:"100%", background:"#6C63FF", border:"none", borderRadius:10, padding:12, color:"#fff", fontWeight:700, fontSize:15, cursor:"pointer" };

    function Avatar({ name, color, url, size = 36 }) {
      const [imgErr, setImgErr] = useState(false);
      if (url && !imgErr) return <img src={url} alt={name} style={{ width:size, height:size, borderRadius:"50%", objectFit:"cover", flexShrink:0, border:"2px solid #2d3f55" }} onError={()=>setImgErr(true)} />;
      return (
        <div style={{ width:size, height:size, borderRadius:"50%", background: color||"#6C63FF",
          display:"flex", alignItems:"center", justifyContent:"center", color:"#fff",
          fontWeight:700, fontSize: size * 0.33, flexShrink:0 }}>
          {name?.slice(0,2).toUpperCase()}
        </div>
      );
    }

    function PhotoUploader({ currentUrl, currentColor, name, onUpload }) {
      const [uploading, setUploading] = useState(false);
      const [preview, setPreview] = useState(currentUrl || "");
      const fileRef = useRef();

      async function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        setUploading(true);
        try {
          const url = await uploadToCloudinary(file);
          setPreview(url);
          onUpload(url);
        } catch(err) {
          alert("Upload failed. Try again.");
        }
        setUploading(false);
      }

      return (
        <div style={{ textAlign:"center", marginBottom:16 }}>
          <div style={{ position:"relative", display:"inline-block" }}>
            <Avatar name={name} color={currentColor} url={preview} size={80} />
            <button style={{ position:"absolute", bottom:0, right:0, width:26, height:26, borderRadius:"50%", background:"#6C63FF", border:"2px solid #111827", color:"#fff", fontSize:14, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}
              onClick={()=>fileRef.current.click()} disabled={uploading}>
              {uploading ? "⏳" : "📷"}
            </button>
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleFile} />
          <div style={{ color:"#475569", fontSize:11, marginTop:6 }}>
            {uploading ? "Uploading..." : "Tap 📷 to change photo"}
          </div>
        </div>
      );
    }

    function ProfileCard({ p, onClose, isOwn, onEdit }) {
      if (!p) return null;
      const wa = p.phone ? `https://wa.me/${p.phone.replace(/[^0-9]/g,'')}` : null;
      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}
          onClick={onClose}>
          <div style={{ background:"#111827", border:"1px solid #2d3f55", borderRadius:20, padding:24, width:"100%", maxWidth:320, textAlign:"center" }}
            onClick={e=>e.stopPropagation()}>
            <Avatar name={p.username} color={p.avatar_color} url={p.avatar_url} size={80} />
            <h2 style={{ color:"#e2e8f0", fontWeight:800, fontSize:20, marginTop:12 }}>{p.username}</h2>
            <div style={{ color:"#a89eff", fontSize:13, marginTop:4 }}>{p.student_id}</div>
            <div style={{ marginTop:16, display:"flex", flexDirection:"column", gap:8 }}>
              {p.university && p.university !== "Not specified" && <div style={{ background:"#1e2a3a", borderRadius:10, padding:"8px 14px", color:"#94a3b8", fontSize:13 }}>🏫 {p.university}</div>}
              {p.department && <div style={{ background:"#1e2a3a", borderRadius:10, padding:"8px 14px", color:"#94a3b8", fontSize:13 }}>📚 {p.department}</div>}
              {p.level && <div style={{ background:"#1e2a3a", borderRadius:10, padding:"8px 14px", color:"#94a3b8", fontSize:13 }}>🎓 {p.level}</div>}
            </div>
            {wa && <a href={wa} target="_blank" style={{ display:"block", marginTop:16, background:"#25D366", borderRadius:10, padding:"10px", color:"#fff", fontSize:14, fontWeight:700, textDecoration:"none" }}>💬 WhatsApp</a>}
            {isOwn && <button style={{ ...BTN, marginTop:12, background:"#1e2a3a" }} onClick={()=>{ onClose(); onEdit(); }}>✏️ Edit Profile</button>}
            <button style={{ background:"none", border:"none", color:"#64748b", fontSize:13, cursor:"pointer", marginTop:8 }} onClick={onClose}>Close</button>
          </div>
        </div>
      );
    }

    function EditProfile({ profile, session, onSave, onClose }) {
      const [avatarUrl, setAvatarUrl] = useState(profile?.avatar_url || "");
      const [university, setUniversity] = useState(profile?.university || "");
      const [department, setDepartment] = useState(profile?.department || "");
      const [level, setLevel] = useState(profile?.level || "");
      const [phone, setPhone] = useState(profile?.phone || "");
      const [saving, setSaving] = useState(false);
      const [err, setErr] = useState("");

      async function save() {
        setSaving(true);
        try {
          await sbFetch(`/profiles?id=eq.${profile.id}`, {
            method: "PATCH",
            headers: { Authorization: `Bearer ${session.access_token}` },
            body: JSON.stringify({ avatar_url: avatarUrl, university, department, level, phone }),
          });
          onSave({ ...profile, avatar_url: avatarUrl, university, department, level, phone });
        } catch(e) { setErr("Failed to save. Try again."); }
        setSaving(false);
      }

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:16, overflowY:"auto" }}>
          <div style={{ background:"#111827", border:"1px solid #2d3f55", borderRadius:20, padding:24, width:"100%", maxWidth:380 }}>
            <h2 style={{ color:"#e2e8f0", fontWeight:800, fontSize:18, marginBottom:16, textAlign:"center" }}>✏️ Edit Profile</h2>
            
            <PhotoUploader currentUrl={avatarUrl} currentColor={profile?.avatar_color} name={profile?.username} onUpload={url=>setAvatarUrl(url)} />

            <label style={{ color:"#94a3b8", fontSize:12, marginBottom:4, display:"block" }}>School / University</label>
            <input style={INP} placeholder="University or school name" value={university} onChange={e=>setUniversity(e.target.value)} />

            <label style={{ color:"#94a3b8", fontSize:12, marginBottom:4, display:"block" }}>Department / Course</label>
            <input style={INP} placeholder="Department or course" value={department} onChange={e=>setDepartment(e.target.value)} />

            <label style={{ color:"#94a3b8", fontSize:12, marginBottom:4, display:"block" }}>Level</label>
            <select style={{ ...INP, appearance:"none" }} value={level} onChange={e=>setLevel(e.target.value)}>
              <option value="">Select Level</option>
              {LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
            </select>

            <label style={{ color:"#94a3b8", fontSize:12, marginBottom:4, display:"block" }}>WhatsApp Number</label>
            <input style={INP} placeholder="e.g. 2348012345678" value={phone} onChange={e=>setPhone(e.target.value)} />

            {err && <div style={{ color:"#f87171", fontSize:13, marginBottom:10 }}>{err}</div>}

            <div style={{ display:"flex", gap:10 }}>
              <button style={{ flex:1, background:"#1e2a3a", border:"none", borderRadius:10, padding:12, color:"#94a3b8", cursor:"pointer", fontSize:14 }} onClick={onClose}>Cancel</button>
              <button style={{ flex:1, ...BTN, opacity: saving?0.6:1 }} onClick={save} disabled={saving}>{saving?"Saving...":"Save Changes"}</button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("login");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [username, setUsername] = useState("");
      const [studentId, setStudentId] = useState("");
      const [department, setDepartment] = useState("");
      const [level, setLevel] = useState("");
      const [phone, setPhone] = useState("");
      const [university, setUniversity] = useState("");
      const [avatarUrl, setAvatarUrl] = useState("");
      const [uploadingAvatar, setUploadingAvatar] = useState(false);
      const [authErr, setAuthErr] = useState("");
      const [loading, setLoading] = useState(false);
      const [session, setSession] = useState(null);
      const [profile, setProfile] = useState(null);
      const [activeRoom, setActiveRoom] = useState("general");
      const [messages, setMessages] = useState([]);
      const [profiles, setProfiles] = useState({});
      const [input, setInput] = useState("");
      const [sending, setSending] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [viewProfile, setViewProfile] = useState(null);
      const [showEdit, setShowEdit] = useState(false);
      const bottomRef = useRef(null);
      const pollRef = useRef(null);
      const signupFileRef = useRef();

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

      useEffect(() => {
        if (!session) return;
        loadMessages();
        clearInterval(pollRef.current);
        pollRef.current = setInterval(loadMessages, 3000);
        return () => clearInterval(pollRef.current);
      }, [activeRoom, session]);

      async function loadMessages() {
        try {
          const data = await sbFetch(`/messages?room=eq.${activeRoom}&order=created_at.asc&limit=50`,
            { headers: { Authorization: `Bearer ${session.access_token}` } });
          setMessages(data);
          const ids = [...new Set(data.map(m => m.user_id))];
          if (ids.length) {
            const ps = await sbFetch(`/profiles?id=in.(${ids.join(',')})`,
              { headers: { Authorization: `Bearer ${session.access_token}` } });
            const map = {};
            ps.forEach(p => map[p.id] = p);
            setProfiles(map);
          }
        } catch(e) {}
      }

      async function handleSignupPhoto(e) {
        const file = e.target.files[0];
        if (!file) return;
        setUploadingAvatar(true);
        try {
          const url = await uploadToCloudinary(file);
          setAvatarUrl(url);
        } catch(err) { alert("Photo upload failed. Try again."); }
        setUploadingAvatar(false);
      }

      async function handleSignup() {
        if (!email || !password || !username || !studentId || !department || !level || !phone)
          return setAuthErr("Please fill in all required fields.");
        if (password.length < 6) return setAuthErr("Password must be at least 6 characters.");
        setLoading(true); setAuthErr("");
        try {
          const data = await signUp(email, password);
          const userId = data.user?.id;
          if (!userId) throw new Error("Signup incomplete. Try logging in.");
          await sbFetch("/profiles", { method:"POST",
            body: JSON.stringify({ id: userId, username, avatar_color: randomColor(),
              student_id: studentId, department, level, phone,
              university: university || "Not specified",
              avatar_url: avatarUrl || null }) });
          setAuthErr("✅ Account created! Please log in.");
          setScreen("login");
        } catch(e) { setAuthErr(e.message); }
        setLoading(false);
      }

      async function handleLogin() {
        if (!email || !password) return setAuthErr("Enter email and password.");
        setLoading(true); setAuthErr("");
        try {
          const data = await signIn(email, password);
          const ps = await sbFetch(`/profiles?id=eq.${data.user?.id}`,
            { headers: { Authorization: `Bearer ${data.access_token}` } });
          if (!ps.length) throw new Error("Profile not found. Please sign up first.");
          setSession(data); setProfile(ps[0]); setScreen("chat");
        } catch(e) { setAuthErr(e.message); }
        setLoading(false);
      }

      async function handleForgotPassword() {
        if (!email) return setAuthErr("Enter your email first.");
        setLoading(true); setAuthErr("");
        try {
          await resetPassword(email);
          setAuthErr("✅ Password reset email sent!");
        } catch(e) { setAuthErr(e.message); }
        setLoading(false);
      }

      async function sendMessage() {
        if (!input.trim() || !session || !profile) return;
        setSending(true);
        try {
          await sbFetch("/messages", { method:"POST",
            headers: { Authorization: `Bearer ${session.access_token}` },
            body: JSON.stringify({ user_id: session.user.id, username: profile.username,
              avatar_color: profile.avatar_color, room: activeRoom, content: input.trim() }) });
          setInput(""); await loadMessages();
        } catch(e) {}
        setSending(false);
      }

      function logout() {
        setSession(null); setProfile(null); setMessages([]);
        setScreen("login"); setEmail(""); setPassword("");
        clearInterval(pollRef.current);
      }

      if (screen === "forgot") {
        return (
          <div style={{ minHeight:"100vh", background:"#0d1520", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
            <div style={{ background:"#111827", border:"1px solid #1e2d3d", borderRadius:20, padding:"36px 28px", width:"100%", maxWidth:360, textAlign:"center" }}>
              <div style={{ fontSize:44, marginBottom:10 }}>🔐</div>
              <h1 style={{ color:"#e2e8f0", fontWeight:800, fontSize:22, marginBottom:4 }}>Forgot Password</h1>
              <p style={{ color:"#64748b", fontSize:13, marginBottom:24 }}>Enter your email to reset your password</p>
              <input style={INP} placeholder="Email address" value={email} type="email" onChange={e=>setEmail(e.target.value)} />
              {authErr && <div style={{ color: authErr.startsWith("✅") ? "#4ade80" : "#f87171", fontSize:13, marginBottom:10 }}>{authErr}</div>}
              <button style={{ ...BTN, opacity: loading ? 0.6 : 1 }} onClick={handleForgotPassword} disabled={loading}>
                {loading ? "Sending..." : "Send Reset Link"}
              </button>
              <button style={{ background:"none", border:"none", color:"#6C63FF", fontSize:13, cursor:"pointer", marginTop:14 }} onClick={()=>{ setScreen("login"); setAuthErr(""); }}>
                Back to Login
              </button>
            </div>
          </div>
        );
      }

      if (screen !== "chat") {
        const isLogin = screen === "login";
        return (
          <div style={{ minHeight:"100vh", background:"#0d1520", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
            <div style={{ background:"#111827", border:"1px solid #1e2d3d", borderRadius:20, padding:"36px 28px", width:"100%", maxWidth:400, textAlign:"center" }}>
              <div style={{ fontSize:44, marginBottom:10 }}>🎓</div>
              <h1 style={{ color:"#e2e8f0", fontWeight:800, fontSize:24, marginBottom:4 }}>CampusHub</h1>
              <p style={{ color:"#64748b", fontSize:13, marginBottom:24 }}>{isLogin ? "Welcome back 👋" : "For every student — jambite to graduate 🎓"}</p>
              
              {!isLogin && <>
                {/* Photo upload during signup */}
                <div style={{ textAlign:"center", marginBottom:16 }}>
                  <div style={{ position:"relative", display:"inline-block" }}>
                    <Avatar name={username||"?"} color="#6C63FF" url={avatarUrl} size={72} />
