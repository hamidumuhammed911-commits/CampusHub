:root {
  --bg:#080c14; --surface:#0d1220; --card:#111827;
  --border:#1e2d45; --border2:#243550;
  --accent:#6C63FF; --accent2:#4FC3F7;

  --text:#f0f4ff; --muted:#64748b; --muted2:#94a3b8;

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);}
input,select,textarea{color:var(--text)!important;font-family:'Space Grotesk',sans-serif;}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:#1e2a3a;color:var(--text);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
body::before{content:'';position:fixed;top:-30vh;left:-20vw;width:80vw;height:80vh;background:radial-gradient(ellipse,rgba(108,99,255,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-4px);opacity:1;}}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.35);}100%{transform:scale(1);}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.reaction-btn:hover{transform:scale(1.2);}
.reaction-btn{transition:transform 0.15s;}
.online-dot{animation:pulse 2s infinite;}
.reaction-pop{animation:pop 0.25s ease;}
.img-msg{max-width:220px;border-radius:12px;cursor:pointer;display:block;margin-top:6px;}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:999;display:flex;align-items:center;justify-content:center;}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:12px;}

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SUPABASE_URL = "https://vwrqdstapeguqjvlwrps.supabase.co";
const SUPABASE_KEY = "sb_publishable_Irsq6di1d317hycpvsD__A_YTQD60ra";
const CLOUDINARY_CLOUD = "dybylicd7";
const CLOUDINARY_PRESET = "campushub";
const EMOJI_REACTIONS = ["👍","❤️","😂","😮","🔥","🎉"];

// ── Shared styles ─────────────────────────────────────────────────────────────
const INP = {width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid #1e2d45",borderRadius:10,padding:"11px 14px",color:"#f0f4ff",fontSize:14,outline:"none",marginBottom:10,display:"block",fontFamily:"'Space Grotesk',sans-serif"};
const BTN = {width:"100%",background:"linear-gradient(135deg,#6C63FF,#4FC3F7)",border:"none",borderRadius:10,padding:12,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"};

// ── API helpers ───────────────────────────────────────────────────────────────
async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:"POST",body:fd});
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.secure_url;
}

async function sbFetch(path, options={}, token) {
  const authKey = token || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
    ...options,
    headers:{
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${authKey}`,
      "Content-Type": "application/json",
      Prefer: "return=representation",
      ...(options.headers||{})
    }
  });
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function signUp(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`,{method:"POST",headers:{apikey:SUPABASE_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password})});
  const data = await res.json();
  if (data.error) throw new Error(data.error.message||"Signup failed");
  return data;
}

async function signIn(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{method:"POST",headers:{apikey:SUPABASE_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password})});
  const data = await res.json();
  if (data.error||data.error_code) throw new Error(data.error_description||"Login failed");
  return data;
}

// ── DM helpers ────────────────────────────────────────────────────────────────
async function getOrCreateConversation(myId, otherId, token) {
  const [u1,u2] = myId<otherId?[myId,otherId]:[otherId,myId];
  const ex = await sbFetch(`/conversations?user1_id=eq.${u1}&user2_id=eq.${u2}`,{headers:{Authorization:`Bearer ${token}`}},token);
  if (ex.length) return ex[0];
  const cr = await sbFetch("/conversations",{method:"POST",headers:{Authorization:`Bearer ${token}`},body:JSON.stringify({user1_id:u1,user2_id:u2})},token);
  return cr[0];
}
async function loadConversations(myId, token) {
  try { return await sbFetch(`/conversations?or=(user1_id.eq.${myId},user2_id.eq.${myId})&order=last_message_at.desc`,{headers:{Authorization:`Bearer ${token}`}},token); }
  catch { return []; }
}
async function loadDirectMessages(convId, token) {
  try { return await sbFetch(`/direct_messages?conversation_id=eq.${convId}&order=created_at.asc&limit=100`,{headers:{Authorization:`Bearer ${token}`}},token); }
  catch { return []; }
}
async function sendDirectMessage(convId, senderId, content, replyTo, mediaUrl, mediaType, token) {
  await sbFetch("/direct_messages",{method:"POST",headers:{Authorization:`Bearer ${token}`},body:JSON.stringify({conversation_id:convId,sender_id:senderId,content:content||null,reply_to:replyTo||null,media_url:mediaUrl||null,media_type:mediaType||null})},token);
  await sbFetch(`/conversations?id=eq.${convId}`,{method:"PATCH",headers:{Authorization:`Bearer ${token}`},body:JSON.stringify({last_message_at:new Date().toISOString()})},token);
}
async function markDmRead(convId, myId, token) {
  try { await sbFetch(`/direct_messages?conversation_id=eq.${convId}&sender_id=neq.${myId}&read_at=is.null`,{method:"PATCH",headers:{Authorization:`Bearer ${token}`},body:JSON.stringify({read_at:new Date().toISOString()})},token); } catch {}
}
async function broadcastDmTyping(convId, userId, token) {
  try { await sbFetch(`/dm_typing?conversation_id=eq.${convId}&user_id=eq.${userId}`,{method:"UPSERT",headers:{Authorization:`Bearer ${token}`,Prefer:"resolution=merge-duplicates"},body:JSON.stringify({conversation_id:convId,user_id:userId,updated_at:new Date().toISOString()})},token); } catch {}
}
async function loadDmTypers(convId, myId, token) {
  try { const cutoff=new Date(Date.now()-5000).toISOString(); const d=await sbFetch(`/dm_typing?conversation_id=eq.${convId}&updated_at=gte.${cutoff}&user_id=neq.${myId}`,{headers:{Authorization:`Bearer ${token}`}},token); return d.length>0; } catch { return false; }
}

// ── Constants ─────────────────────────────────────────────────────────────────
const ROOMS = [
  {id:"general",label:"general",emoji:"💬"},
  {id:"study",label:"study-group",emoji:"📚"},
  {id:"announcements",label:"announcements",emoji:"📢"},
  {id:"off-topic",label:"off-topic",emoji:"🎮"},
  {id:"assignments",label:"assignments",emoji:"📝"},
];
const LEVELS = ["Jambite (Pre-university)","100L","200L","300L","400L","500L","Graduate"];
const COLORS = ["#6C63FF","#FF6584","#43B89C","#F4A261","#4FC3F7","#FF8A65","#A29BFE"];
const randomColor = () => COLORS[Math.floor(Math.random()*COLORS.length)];
const timeStr = ts => new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const dateStr = ts => {
  const d=new Date(ts),now=new Date();
  if (d.toDateString()===now.toDateString()) return "Today";
  const yest=new Date(now); yest.setDate(yest.getDate()-1);
  if (d.toDateString()===yest.toDateString()) return "Yesterday";
  return d.toLocaleDateString([],{month:"short",day:"numeric"});
};

// ── Avatar ────────────────────────────────────────────────────────────────────
function Avatar({name,color,url,size=36,online=false}){
  const [err,setErr]=useState(false);
  return (
    <div style={{position:"relative",flexShrink:0}}>
      {url&&!err
        ?<img src={url} alt={name} onError={()=>setErr(true)} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:"2px solid #1e2d45",display:"block"}}/>
        :<div style={{width:size,height:size,borderRadius:"50%",background:color||"#6C63FF",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:size*0.33}}>{name?.slice(0,2).toUpperCase()}</div>
      }
      {online&&<span className="online-dot" style={{position:"absolute",bottom:1,right:1,width:9,height:9,borderRadius:"50%",background:"#22c55e",border:"2px solid #111827"}}/>}
    </div>
  );
}

// ── PhotoUploader ─────────────────────────────────────────────────────────────
function PhotoUploader({currentUrl,currentColor,name,onUpload}){
  const [uploading,setUploading]=useState(false);
  const [preview,setPreview]=useState(currentUrl||"");
  const ref=useRef();
  async function handleFile(e){
    const file=e.target.files[0]; if(!file)return;
    setUploading(true);
    try{const url=await uploadToCloudinary(file);setPreview(url);onUpload(url);}
    catch{alert("Upload failed.");}
    setUploading(false);
  }
  return(
    <div style={{textAlign:"center",marginBottom:16}}>
      <div style={{position:"relative",display:"inline-block"}}>
        <Avatar name={name} color={currentColor} url={preview} size={80}/>
        <button style={{position:"absolute",bottom:0,right:0,width:26,height:26,borderRadius:"50%",background:"#6C63FF",border:"2px solid #111827",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={()=>ref.current.click()} disabled={uploading}>{uploading?"⏳":"📷"}</button>
      </div>
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
      <div style={{color:"#475569",fontSize:11,marginTop:6}}>{uploading?"Uploading...":"Tap 📷 to change photo"}</div>
    </div>
  );
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function Lightbox({url,onClose}){
  useEffect(()=>{const fn=e=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);},[]);
  return(<div className="lightbox" onClick={onClose}><img src={url} onClick={e=>e.stopPropagation()} alt="full"/></div>);
}

        {!isOwn&&<button style={{...BTN,marginTop:10,background:"rgba(108,99,255,0.15)",border:"1px solid rgba(108,99,255,0.3)"}} onClick={()=>onMessage(p.id)}>💬 Send Message</button>}
        {isOwn&&<button 
{isOwn&&<button style={{...BTN,marginTop:12,background:"rgba(255,255,255,0.05)",border:"1px solid #1e2d45"}} onClick={()=>{onClose();onEdit();}}>✏️ Edit Profile</button>}

// ── EditProfile ───────────────────────────────────────────────────────────────
function EditProfile({profile,session,onSave,onClose}){
  const [avatarUrl,setAvatarUrl]=useState(profile?.avatar_url||"");
  const [university,setUniversity]=useState(profile?.university||"");
  const [department,setDepartment]=useState(profile?.department||"");
  const [level,setLevel]=useState(profile?.level||"");
  const [phone,setPhone]=useState(profile?.phone||"");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  async function save(){
    setSaving(true);
    try{await sbFetch(`/profiles?id=eq.${profile.id}`,{method:"PATCH",headers:{Authorization:`Bearer ${session.access_token}`},body:JSON.stringify({avatar_url:avatarUrl,university,department,level,phone})},session.access_token);
    onSave({...profile,avatar_url:avatarUrl,university,department,level,phone});}
    catch{setErr("Failed to save. Try again.");}
    setSaving(false);
  }
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
      <div style={{background:"#111827",border:"1px solid #1e2d45",borderRadius:20,padding:24,width:"100%",maxWidth:380}}>
        <h2 style={{color:"#f0f4ff",fontWeight:800,fontSize:18,marginBottom:16,textAlign:"center"}}>✏️ Edit Profile</h2>
        <PhotoUploader currentUrl={avatarUrl} currentColor={profile?.avatar_color} name={profile?.username} onUpload={url=>setAvatarUrl(url)}/>
        <label style={{color:"#94a3b8",fontSize:12,marginBottom:4,display:"block"}}>School / University</label>
        <input style={INP} placeholder="University or school name" value={university} onChange={e=>setUniversity(e.target.value)}/>
        <label style={{color:"#94a3b8",fontSize:12,marginBottom:4,display:"block"}}>Department / Course</label>
        <input style={INP} placeholder="Department or course" value={department} onChange={e=>setDepartment(e.target.value)}/>
        <label style={{color:"#94a3b8",fontSize:12,marginBottom:4,display:"block"}}>Level</label>
        <select style={{...INP,appearance:"none"}} value={level} onChange={e=>setLevel(e.target.value)}>
          <option value="">Select Level</option>
          {LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
        </select>
        <label style={{color:"#94a3b8",fontSize:12,marginBottom:4,display:"block"}}>WhatsApp Number</label>
        <input style={INP} placeholder="e.g. 2348012345678" value={phone} onChange={e=>setPhone(e.target.value)}/>
        {err&&<div style={{color:"#f87171",fontSize:13,marginBottom:10}}>{err}</div>}
        <div style={{display:"flex",gap:10}}>
          <button style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid #1e2d45",borderRadius:10,padding:12,color:"#94a3b8",cursor:"pointer",fontSize:14}} onClick={onClose}>Cancel</button>
          <button style={{flex:1,...BTN,opacity:saving?0.6:1}} onClick={save} disabled={saving}>{saving?"Saving...":"Save Changes"}</button>
        </div>
      </div>
    </div>
  );
}

// ── ReactionBar ───────────────────────────────────────────────────────────────
function ReactionBar({msgId,reactions,userId,onReact}){
  const [open,setOpen]=useState(false);
  const grouped={};
  (reactions||[]).forEach(r=>{grouped[r.emoji]=grouped[r.emoji]||[];grouped[r.emoji].push(r.user_id);});
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4,alignItems:"center"}}>
      {Object.entries(grouped).map(([emoji,users])=>{
        const mine=users.includes(userId);
        return(<button key={emoji} className="reaction-btn" onClick={()=>onReact(msgId,emoji)}
          style={{background:mine?"rgba(108,99,255,0.25)":"rgba(255,255,255,0.05)",border:mine?"1px solid #6C63FF":"1px solid #1e2d45",borderRadius:20,padding:"2px 8px",fontSize:13,cursor:"pointer",color:"#e2e8f0",display:"flex",alignItems:"center",gap:4}}>
          {emoji}<span style={{fontSize:11,color:"#94a3b8"}}>{users.length}</span>
        </button>);
      })}
      <button className="reaction-btn" onClick={()=>setOpen(!open)}
        style={{background:"rgba(255,255,255,0.05)",border:"1px solid #1e2d45",borderRadius:20,padding:"2px 8px",fontSize:13,cursor:"pointer",color:"#64748b"}}>
        {open?"✕":"＋"}
      </button>
      {open&&(
        <div style={{display:"flex",gap:4,background:"#111827",border:"1px solid #1e2d45",borderRadius:20,padding:"4px 8px",flexWrap:"wrap"}}>
          {EMOJI_REACTIONS.map(e=>(
            <button key={e} className="reaction-btn" onClick={()=>{onReact(msgId,e);setOpen(false);}}
              style={{background:"none",border:"none",fontSize:18,cursor:"pointer"}}>{e}</button>
          ))}
        </div>
      )}
    </div>
  );
}

      <div>
        <div style={{color:"#a89eff",fontSize:11,fontWeight:700}}>↩ Replying to {msg.username}</div>

}

// ── DateDivider ───────────────────────────────────────────────────────────────

      <div style={{flex:1,height:1,background:"#1e2d45"}}/>

// ── TypingIndicator ───────────────────────────────────────────────────────────
function TypingIndicator({typers}){
  if(!typers||typers.length===0)return null;
  const names=typers.slice(0,2).join(", ");
  const extra=typers.length>2?` +${typers.length-2}`:"";
  return(
    <div style={{color:"#64748b",fontSize:12,padding:"0 16px 6px",display:"flex",alignItems:"center",gap:6}}>
      <span style={{display:"inline-flex",gap:3}}>
        {[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:"#475569",display:"inline-block",animation:`bounce ${0.8+i*0.2}s ${i*0.15}s infinite`}}/>)}
      </span>
      <span>{names}{extra} typing…</span>
    </div>
  );
}

// ── ConversationList ──────────────────────────────────────────────────────────
function ConversationList({conversations,profiles,myId,onlineUsers,onSelect}){
  if(!conversations.length)return(
    <div style={{color:"#475569",textAlign:"center",marginTop:60,padding:16}}>
      <div style={{fontSize:40,marginBottom:12}}>💬</div>
      <div style={{fontWeight:600,color:"#94a3b8",marginBottom:6}}>No conversations yet</div>
      <div style={{fontSize:13}}>Start a DM from someone's profile!</div>
    </div>
  );
  return(
    <div style={{display:"flex",flexDirection:"column"}}>
      {conversations.map(conv=>{
        const otherId=conv.user1_id===myId?conv.user2_id:conv.user1_id;
        const p=profiles[otherId]||{username:"Unknown"};
        const isOnline=!!onlineUsers[otherId];
        return(
          <button key={conv.id} onClick={()=>onSelect(conv,otherId)}
            style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:"none",border:"none",borderBottom:"1px solid #1e2d45",cursor:"pointer",textAlign:"left",width:"100%",transition:"background 0.1s"}}
            onMouseOver={e=>e.currentTarget.style.background="rgba(255,255,255,0.03)"}
            onMouseOut={e=>e.currentTarget.style.background="none"}>
            <Avatar name={p.username} color={p.avatar_color} url={p.avatar_url} size={44} online={isOnline}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:"#f0f4ff",fontWeight:700,fontSize:14}}>{p.username}</div>
              <div style={{color:isOnline?"#22c55e":"#475569",fontSize:12,marginTop:2}}>{isOnline?"● Online":"● Offline"}</div>
            </div>
            <span style={{color:"#475569",fontSize:18}}>›</span>
          </button>
        );
      })}
    </div>
  );
}

function isOwnMsg(msg,myId){return msg.sender_id===myId;}

// ── DmChatView ────────────────────────────────────────────────────────────────
function DmChatView({conversation,otherProfile,session,onBack,onlineUsers}){
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [sending,setSending]=useState(false);
  const [replyTo,setReplyTo]=useState(null);
  const [uploadingImg,setUploadingImg]=useState(false);
  const [otherTyping,setOtherTyping]=useState(false);
  const [lightbox,setLightbox]=useState(null);
  const [msgMenuId,setMsgMenuId]=useState(null);
  const bottomRef=useRef(null);
  const pollRef=useRef(null);
  const typingRef=useRef(null);
  const imgRef=useRef();
  const myId=session.user.id;
  const token=session.access_token;
  const isOnline=!!onlineUsers[otherProfile.id];

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);
  useEffect(()=>{
    load(); markDmRead(conversation.id,myId,token);
    clearInterval(pollRef.current);
    pollRef.current=setInterval(()=>{load();markDmRead(conversation.id,myId,token);loadDmTypers(conversation.id,myId,token).then(setOtherTyping);},3000);
    return()=>clearInterval(pollRef.current);
  },[conversation.id]);

  async function load(){const d=await loadDirectMessages(conversation.id,token);setMessages(d);}
  function handleInputChange(e){setInput(e.target.value);clearTimeout(typingRef.current);broadcastDmTyping(conversation.id,myId,token);typingRef.current=setTimeout(()=>{},4000);}
  async function send(mediaUrl=null,mediaType=null){
    if(!mediaUrl&&!input.trim())return;
    setSending(true);
    try{await sendDirectMessage(conversation.id,myId,mediaUrl?null:input.trim(),replyTo?.id||null,mediaUrl,mediaType,token);setInput("");setReplyTo(null);await load();}catch{}
    setSending(false);
  }
  async function handleImageSend(e){
    const file=e.target.files[0];if(!file)return;
    setUploadingImg(true);
    try{const url=await uploadToCloudinary(file);await send(url,"image");}catch{alert("Image upload failed.");}
    setUploadingImg(false);e.target.value="";
  }
  async function editMessage(msgId,newContent){
    try{await sbFetch(`/direct_messages?id=eq.${msgId}`,{method:"PATCH",headers:{Authorization:`Bearer ${token}`},body:JSON.stringify({content:newContent,edited_at:new Date().toISOString()})},token);await load();}catch{}
  }
  async function deleteDm(msgId){
    try{await sbFetch(`/direct_messages?id=eq.${msgId}`,{method:"DELETE",headers:{Authorization:`Bearer ${token}`}},token);setMsgMenuId(null);await load();}catch{}
  }

  const grouped=[];let lastDate=null;
  messages.forEach(msg=>{const d=dateStr(msg.created_at);if(d!==lastDate){grouped.push({type:"divider",label:d});lastDate=d;}grouped.push({type:"msg",msg});});

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}} onClick={()=>{if(msgMenuId)setMsgMenuId(null);}}>
      {lightbox&&<Lightbox url={lightbox} onClose={()=>setLightbox(null)}/>}
      <div style={{padding:"12px 16px",borderBottom:"1px solid #1e2d45",background:"rgba(13,18,32,0.9)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <button style={{background:"rgba(255,255,255,0.05)",border:"1px solid #1e2d45",borderRadius:10,color:"#94a3b8",fontSize:16,cursor:"pointer",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onBack}>←</button>
        <Avatar name={otherProfile.username} color={otherProfile.avatar_color} url={otherProfile.avatar_url} size={36} online={isOnline}/>
        <div style={{flex:1}}>
          <div style={{color:"#f0f4ff",fontWeight:700,fontSize:14}}>{otherProfile.username}</div>
          <div style={{color:isOnline?"#22c55e":"#475569",fontSize:11}}>{isOnline?"● Online":"● Offline"}</div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:2}}>
        {messages.length===0&&<div style={{color:"#475569",textAlign:"center",marginTop:60}}>
          <div style={{fontSize:36,marginBottom:10}}>👋</div>
          <div style={{fontSize:14,color:"#94a3b8"}}>No messages yet — say hello!</div>
        </div>}
        {grouped.map((item,idx)=>{
          if(item.type==="divider")return<DateDivider key={`d-${idx}`} label={item.label}/>;
          const{msg}=item;
          const isOwn=msg.sender_id===myId;
          const showMenu=msgMenuId===msg.id;
          const isRead=isOwn&&!!msg.read_at;
          return(
            <div key={msg.id} className="msg-bubble" style={{display:"flex",alignItems:"flex-start",gap:10,flexDirection:isOwn?"row-reverse":"row",marginBottom:2,position:"relative"}}>
              <div style={{maxWidth:"72%",display:"flex",flexDirection:"column",alignItems:isOwn?"flex-end":"flex-start"}}>
                {msg.reply_to&&(
                  <div style={{background:"rgba(108,99,255,0.08)",borderLeft:"3px solid #6C63FF",borderRadius:"0 8px 8px 0",padding:"4px 10px",marginBottom:4,maxWidth:"100%"}}>
                    <div style={{color:"#a89eff",fontSize:10,fontWeight:700}}>↩ Reply</div>
                  </div>
                )}
                <div onContextMenu={e=>{e.preventDefault();setMsgMenuId(msg.id);}}
                  onTouchStart={()=>{const t=setTimeout(()=>setMsgMenuId(msg.id),600);return()=>clearTimeout(t);}}
                  style={{padding:msg.media_url?"4px":"9px 13px",color:"#f0f4ff",fontSize:14,lineHeight:1.5,wordBreak:"break-word",
                    background:isOwn?"linear-gradient(135deg,#6C63FF,#5b54e8)":"rgba(255,255,255,0.06)",
                    border:isOwn?"none":"1px solid #1e2d45",
                    borderRadius:isOwn?"18px 18px 4px 18px":"18px 18px 18px 4px",cursor:"default"}}>
                  {msg.media_url&&msg.media_type==="image"&&<img src={msg.media_url} className="img-msg" onClick={()=>setLightbox(msg.media_url)} alt="shared"/>}
                  {msg.content&&<span>{msg.content}</span>}
                </div>
                <span style={{color:"#475569",fontSize:10,marginTop:3,display:"flex",gap:4,alignItems:"center"}}>
                  {timeStr(msg.created_at)}
                  {msg.edited_at&&<span style={{fontStyle:"italic"}}>(edited)</span>}
                  {isOwn&&<span style={{color:isRead?"#4FC3F7":"#475569"}}>{isRead?"✓✓":"✓"}</span>}
                </span>
              </div>
              {showMenu&&(
                <div style={{position:"absolute",[isOwn?"right":"left"]:0,top:0,background:"#111827",border:"1px solid #1e2d45",borderRadius:12,padding:6,zIndex:40,minWidth:130,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
                  <button style={{display:"block",width:"100%",background:"none",border:"none",color:"#f0f4ff",fontSize:13,padding:"7px 12px",cursor:"pointer",textAlign:"left",borderRadius:8}} onClick={()=>{setReplyTo(msg);setMsgMenuId(null);}}>↩ Reply</button>
                  {isOwn&&msg.media_type!=="image"&&<button style={{display:"block",width:"100%",background:"none",border:"none",color:"#f0f4ff",fontSize:13,padding:"7px 12px",cursor:"pointer",textAlign:"left",borderRadius:8}} onClick={()=>{const nc=prompt("Edit message:",msg.content);if(nc!=null)editMessage(msg.id,nc);setMsgMenuId(null);}}>✏ Edit</button>}
                  {isOwn&&<button style={{display:"block",width:"100%",background:"none",border:"none",color:"#f87171",fontSize:13,padding:"7px 12px",cursor:"pointer",textAlign:"left",borderRadius:8}} onClick={()=>deleteDm(msg.id)}>🗑 Delete</button>}
                </div>
              )}
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      {otherTyping&&<div style={{color:"#64748b",fontSize:12,padding:"0 16px 6px",display:"flex",alignItems:"center",gap:6}}>
        <span style={{display:"inline-flex",gap:3}}>{[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:"#475569",display:"inline-block",animation:`bounce ${0.8+i*0.15}s ${i*0.15}s infinite`}}/>)}</span>
        <span>{otherProfile.username} is typing…</span>
      </div>}
      {/* DM Composer */}
      <div style={{padding:"10px 12px 14px",borderTop:"1px solid #1e2d45",background:"rgba(13,18,32,0.9)",flexShrink:0}}>
        <ReplyPreview msg={replyTo?{username:isOwnMsg(replyTo,myId)?"You":otherProfile.username,content:replyTo.content,image_url:replyTo.media_url}:null} onCancel={()=>setReplyTo(null)}/>
        <div style={{display:"flex",gap:8,alignItems:"center",background:"rgba(255,255,255,0.04)",border:"1px solid #1e2d45",borderRadius:16,padding:"6px 6px 6px 12px"}}>
          <button style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",width:32,height:32}} onClick={()=>imgRef.current.click()} disabled={uploadingImg}>{uploadingImg?"⏳":"📎"}</button>
          <input ref={imgRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImageSend}/>
          <input style={{flex:1,background:"none",border:"none",outline:"none",color:"#f0f4ff",fontSize:14,fontFamily:"'Space Grotesk',sans-serif"}}
            placeholder={`Message ${otherProfile.username}...`} value={input}
            onChange={handleInputChange}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}/>
          <button style={{width:36,height:36,borderRadius:11,background:"linear-gradient(135deg,#6C63FF,#4FC3F7)",border:"none",color:"#fff",fontSize:16,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",opacity:(input.trim()||uploadingImg)&&!sending?1:0.35,transition:"all 0.15s",boxShadow:(input.trim()||uploadingImg)&&!sending?"0 2px 12px rgba(108,99,255,0.4)":"none"}}
            onClick={()=>send()} disabled={(!input.trim()&&!uploadingImg)||sending}>↑</button>
        </div>
      </div>
    </div>
  );
}

// ── GlobalSearch ──────────────────────────────────────────────────────────────
function GlobalSearch({session,profiles,onClose,onOpenDm,onSwitchRoom}){
  const [query,setQuery]=useState("");
  const [tab,setTab]=useState("messages");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const inputRef=useRef();
  const debounceRef=useRef();

  useEffect(()=>{inputRef.current?.focus();},[]);
  useEffect(()=>{
    clearTimeout(debounceRef.current);
    if(!query.trim()){setResults([]);return;}
    debounceRef.current=setTimeout(()=>runSearch(query.trim()),350);
  },[query,tab]);

  async function runSearch(q){
    setLoading(true);
    try{
      if(tab==="messages"){
        const d=await sbFetch(`/messages?content=ilike.*${encodeURIComponent(q)}*&limit=20&order=created_at.desc&select=id,content,created_at,username,room,image_url`,{},session.access_token);
        setResults(Array.isArray(d)?d:[]);
      } else if(tab==="users"){
        const d=await sbFetch(`/profiles?username=ilike.*${encodeURIComponent(q)}*&limit=15&select=id,username,avatar_url,avatar_color,department,university,level`,{},session.access_token);
        setResults(Array.isArray(d)?d:[]);
      } else {
        setResults(ROOMS.filter(r=>r.label.includes(q.toLowerCase())||r.id.includes(q.toLowerCase())));
      }
    }catch{setResults([]);}
    setLoading(false);
  }

  function highlight(text,q){
    if(!text||!q)return text;
    const parts=text.split(new RegExp(`(${q})`, "gi"));
    return parts.map((p,i)=>p.toLowerCase()===q.toLowerCase()?<mark key={i} style={{background:"rgba(108,99,255,0.3)",color:"#c4b5fd",borderRadius:3,padding:"0 2px"}}>{p}</mark>:p);
  }

  const TABS=[{id:"messages",label:"💬 Messages"},{id:"users",label:"👤 People"},{id:"rooms",label:"# Rooms"}];

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"16px 16px 0"}} onClick={onClose}>
      <div style={{background:"#0d1220",border:"1px solid #1e2d45",borderRadius:20,width:"100%",maxWidth:540,maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden",animation:"slideUp 0.2s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"14px 14px 0"}}>
          <div style={{display:"flex",gap:10,alignItems:"center",background:"rgba(255,255,255,0.05)",border:"1px solid #1e2d45",borderRadius:12,padding:"10px 14px",marginBottom:12}}>
            <span style={{fontSize:16}}>🔍</span>
            <input ref={inputRef} style={{flex:1,background:"none",border:"none",outline:"none",color:"#f0f4ff",fontSize:15,fontFamily:"'Space Grotesk',sans-serif"}} placeholder="Search CampusHub…" value={query} onChange={e=>setQuery(e.target.value)}/>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>
          </div>
          <div style={{display:"flex",borderBottom:"1px solid #1e2d45"}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>{setTab(t.id);setResults([]);if(query.trim())runSearch(query.trim());}}
                style={{flex:1,padding:"10px 0",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:"transparent",color:tab===t.id?"#a89eff":"#475569",borderBottom:tab===t.id?"2px solid #6C63FF":"2px solid transparent",fontFamily:"'Space Grotesk',sans-serif"}}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {!query.trim()&&<div style={{color:"#475569",textAlign:"center",padding:"40px 16px",fontSize:13}}>Start typing to search across CampusHub</div>}
          {loading&&<div style={{color:"#475569",textAlign:"center",padding:"30px 16px",fontSize:13}}>Searching…</div>}
          {!loading&&query.trim()&&results.length===0&&<div style={{color:"#475569",textAlign:"center",padding:"40px 16px",fontSize:13}}>No results for "{query}"</div>}
          {tab==="messages"&&results.map(msg=>{
            const rm=ROOMS.find(r=>r.id===msg.room);
            return(<button key={msg.id} onClick={()=>{onSwitchRoom(msg.room);onClose();}}
              style={{display:"block",width:"100%",textAlign:"left",padding:"12px 16px",background:"none",border:"none",borderBottom:"1px solid #1e2d45",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{color:"#6C63FF",fontSize:11,fontWeight:700}}>{rm?`${rm.emoji} #${rm.label}`:msg.room}</span>
                <span style={{color:"#475569",fontSize:10,marginLeft:"auto"}}>{timeStr(msg.created_at)}</span>
              </div>
              <div style={{color:"#94a3b8",fontSize:12,fontWeight:700,marginBottom:2}}>{msg.username}</div>
              <div style={{color:"#cbd5e1",fontSize:13,lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
                {msg.image_url?"📷 Photo":highlight(msg.content,query)}
              </div>
            </button>);
          })}
          {tab==="users"&&results.map(p=>(
            <button key={p.id} onClick={()=>{if(p.id!==session.user.id)onOpenDm(p.id);onClose();}}
              style={{display:"flex",alignItems:"center",gap:12,width:"100%",textAlign:"left",padding:"12px 16px",background:"none",border:"none",borderBottom:"1px solid #1e2d45",cursor:"pointer"}}>
              <Avatar name={p.username} color={p.avatar_color} url={p.avatar_url} size={40}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:"#f0f4ff",fontWeight:700,fontSize:13}}>{highlight(p.username,query)}</div>
                {p.department&&<div style={{color:"#64748b",fontSize:11}}>{highlight(p.department,query)}</div>}
              </div>
              {p.id!==session.user.id&&<span style={{color:"#475569",fontSize:11}}>DM →</span>}
            </button>
          ))}
          {tab==="rooms"&&results.map(room=>(
            <button key={room.id} onClick={()=>{onSwitchRoom(room.id);onClose();}}
              style={{display:"flex",alignItems:"center",gap:14,width:"100%",textAlign:"left",padding:"14px 16px",background:"none",border:"none",borderBottom:"1px solid #1e2d45",cursor:"pointer"}}>
              <span style={{fontSize:28}}>{room.emoji}</span>
              <div>
                <div style={{color:"#f0f4ff",fontWeight:700,fontSize:14}}>#{highlight(room.label,query)}</div>
                <div style={{color:"#475569",fontSize:11}}>Tap to open room</div>
              </div>
              <span style={{color:"#475569",fontSize:11,marginLeft:"auto"}}>→</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [profiles,setProfiles]=useState({});
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [room,setRoom]=useState("general");
  const [view,setView]=useState("chat");
  const [conversations,setConversations]=useState([]);
  const [currentConv,setCurrentConv]=useState(null);
  const [currentDmUser,setCurrentDmUser]=useState(null);
  const [onlineUsers,setOnlineUsers]=useState({});
  const [viewProfile,setViewProfile]=useState(null);
  const [lightbox,setLightbox]=useState(null);
  const [replyTo,setReplyTo]=useState(null);
  const [msgMenuId,setMsgMenuId]=useState(null);
  const [showSearch,setShowSearch]=useState(false);
  const [pinned,setPinned]=useState([]);
  const [uploadingImg,setUploadingImg]=useState(false);
  const bottomRef=useRef(null);
  const pollRef=useRef(null);
  const inputRef=useRef(null);
  const imgRef=useRef(null);

  useEffect(()=>{
    const s=localStorage.getItem("ch_session");
    if(s){const p=JSON.parse(s);setSession(p);loadProfile(p);}
  },[]);

  async function loadProfile(sess){
    try{const d=await sbFetch(`/profiles?id=eq.${sess.user.id}`,{headers:{Authorization:`Bearer ${sess.access_token}`}},sess.access_token);if(d[0])setProfile(d[0]);}catch{}
  }
  async function handleLogin(sess){localStorage.setItem("ch_session",JSON.stringify(sess));setSession(sess);await loadProfile(sess);}
  function handleLogout(){localStorage.removeItem("ch_session");setSession(null);setProfile(null);setMessages([]);setConversations([]);}

  useEffect(()=>{
    if(!session)return;
    loadMessages();loadAllProfiles();
    clearInterval(pollRef.current);
    pollRef.current=setInterval(()=>{loadMessages();loadPresence();},3000);
    return()=>clearInterval(pollRef.current);
  },[session,room]);

  async function loadMessages(){
    if(!session)return;
    try{
      const data=await sbFetch(`/messages?room=eq.${room}&private=eq.false&order=created_at.asc&limit=100`,{headers:{Authorization:`Bearer ${session.access_token}`}},session.access_token);
      setMessages(Array.isArray(data)?data:[]);
    }catch{}
  }
  async function loadAllProfiles(){
    try{const d=await sbFetch(`/profiles?select=id,username,avatar_url,avatar_color,department,university,level,phone,student_id,role`,{headers:{Authorization:`Bearer ${session.access_token}`}},session.access_token);if(Array.isArray(d)){const m={};d.forEach(p=>{m[p.id]=p;});setProfiles(m);}}catch{}
  }
  async function loadPresence(){
    try{const cutoff=new Date(Date.now()-60000).toISOString();const d=await sbFetch(`/profiles?last_seen=gte.${cutoff}&select=id`,{headers:{Authorization:`Bearer ${session.access_token}`}},session.access_token);if(Array.isArray(d)){const m={};d.forEach(p=>{m[p.id]=true;});setOnlineUsers(m);}}catch{}
  }
  async function openDmWith(userId){
    const conv=await getOrCreateConversation(session.user.id,userId,session.access_token);
    setCurrentConv(conv);setCurrentDmUser(userId);setView("dm");
  }
  useEffect(()=>{if(!session||view!=="dms")return;loadConversations(session.user.id,session.access_token).then(setConversations);},[view,session]);

  async function sendMsg(mediaUrl=null,mediaType=null){
    if(!mediaUrl&&!input.trim())return;
    const body={
      room,
      user_id:session.user.id,
      username:profile?.username||"User",
      avatar_color:profile?.avatar_color||"#6C63FF",
      content:mediaUrl?null:input.trim(),
      image_url:mediaUrl||null,
      private:false,
      event:"message",
      topic:"room",
      reply_to:replyTo?.id||null,
    };
    try{
      await sbFetch("/messages",{method:"POST",headers:{Authorization:`Bearer ${session.access_token}`},body:JSON.stringify(body)},session.access_token);
      setInput("");setReplyTo(null);await loadMessages();
      setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),100);
    }catch(e){console.error("Send failed:",e);}
  }

  async function handleImageUpload(e){
    const file=e.target.files[0];if(!file)return;
    setUploadingImg(true);
    try{const url=await uploadToCloudinary(file);await sendMsg(url,"image");}catch{alert("Image upload failed.");}
    setUploadingImg(false);e.target.value="";
  }

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  if(!session||!profile)return<LoginScreen onLogin={handleLogin}/>;
  const myProfile=profile;
  const currentRoom=ROOMS.find(r=>r.id===room)||{emoji:"💬",label:room};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",background:"var(--bg)",color:"var(--text)",fontFamily:"'Space Grotesk',sans-serif",maxWidth:640,margin:"0 auto",position:"relative",zIndex:1}} onClick={()=>{if(msgMenuId)setMsgMenuId(null);}}>
      {lightbox&&<Lightbox url={lightbox} onClose={()=>setLightbox(null)}/>}
      {viewProfile&&<ProfileCard p={viewProfile} onClose={()=>setViewProfile(null)} isOwn={viewProfile.id===session.user.id} onEdit={()=>{setViewProfile(null);setView("editProfile");}} online={!!onlineUsers[viewProfile.id]} onMessage={uid=>{setViewProfile(null);openDmWith(uid);}}/>}
      {showSearch&&<GlobalSearch session={session} profiles={profiles} onClose={()=>setShowSearch(false)} onOpenDm={uid=>{openDmWith(uid);}} onSwitchRoom={r=>{setRoom(r);setView("chat");}}/>}
      {view==="editProfile"&&<EditProfile profile={myProfile} session={session} onSave={p=>{setProfile(p);setView("profile");}} onClose={()=>setView("profile")}/>}

      {/* Header */}
      <div style={{padding:"0 16px",height:56,background:"rgba(13,18,32,0.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid #1e2d45",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{flex:1,fontWeight:800,fontSize:16}}>
          {view==="chat"&&<span style={{color:"#f0f4ff"}}><span style={{color:"#6C63FF",marginRight:6}}>{currentRoom.emoji}</span>#{currentRoom.label}</span>}
          {view==="dms"&&<span style={{color:"#f0f4ff"}}>💬 Messages</span>}
          {view==="dm"&&<span style={{color:"#f0f4ff"}}>← Direct Message</span>}
          {view==="profile"&&<span style={{color:"#f0f4ff"}}>👤 Profile</span>}
{view==="editProfile"&&<span style={{color:"#f0f4ff"}}>✏️ Edit Profile</span>}
        </div>
        <button onClick={()=>setShowSearch(true)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid #1e2d45",borderRadius:10,color:"#94a3b8",fontSize:16,cursor:"pointer",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}>🔍</button>
        <button onClick={()=>setViewProfile(myProfile)} style={{background:"none",border:"none",padding:0,cursor:"pointer"}}>
          <Avatar name={myProfile.username} color={myProfile.avatar_color} url={myProfile.avatar_url} size={34} online={true}/>
        </button>
      </div>

      {/* Body */}
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {view==="chat"&&(
          <>
            <div style={{display:"flex",overflowX:"auto",borderBottom:"1px solid #1e2d45",background:"rgba(13,18,32,0.8)",flexShrink:0,scrollbarWidth:"none"}}>
              {ROOMS.map(r=>(
                <button key={r.id} onClick={()=>setRoom(r.id)}
                  style={{padding:"10px 14px",background:"none",border:"none",borderBottom:room===r.id?"2px solid #6C63FF":"2px solid transparent",color:room===r.id?"#a89eff":"#475569",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Space Grotesk',sans-serif",transition:"color 0.15s"}}>
                  {r.emoji} {r.label}
                </button>
              ))}
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"12px 14px",display:"flex",flexDirection:"column",gap:2}}>
              {messages.length===0&&(
                <div style={{textAlign:"center",marginTop:60,color:"#475569"}}>
                  <div style={{fontSize:40,marginBottom:10}}>{currentRoom.emoji}</div>
                  <div style={{fontSize:15,color:"#94a3b8",fontWeight:600,marginBottom:4}}>#{currentRoom.label}</div>
                  <div style={{fontSize:13}}>No messages yet. Be the first to say something!</div>
                </div>
              )}
              {messages.map((msg,i)=>{
                const isOwn=msg.user_id===session.user.id;
                const showMenu=msgMenuId===msg.id;
                const prevMsg=messages[i-1];
                const showDate=!prevMsg||dateStr(msg.created_at)!==dateStr(prevMsg.created_at);
                return(
                  <React.Fragment key={msg.id}>
                    {showDate&&<DateDivider label={dateStr(msg.created_at)}/>}
                    <div className="msg-bubble" id={`msg-${msg.id}`}
                      style={{display:"flex",gap:10,alignItems:"flex-start",flexDirection:isOwn?"row-reverse":"row",padding:"2px 4px",borderRadius:10}}
                      onContextMenu={e=>{e.preventDefault();setMsgMenuId(msg.id);}}
                      onTouchStart={()=>{const t=setTimeout(()=>setMsgMenuId(msg.id),600);return()=>clearTimeout(t);}}>
                      <button style={{background:"none",border:"none",padding:0,cursor:"pointer",flexShrink:0,marginTop:2}} onClick={()=>setViewProfile(profiles[msg.user_id]||{id:msg.user_id,username:msg.username})}>
                        <Avatar name={msg.username} color={profiles[msg.user_id]?.avatar_color||msg.avatar_color} url={profiles[msg.user_id]?.avatar_url} size={32} online={!!onlineUsers[msg.user_id]}/>
                      </button>
                      <div style={{flex:1,minWidth:0,maxWidth:"75%",display:"flex",flexDirection:"column",alignItems:isOwn?"flex-end":"flex-start"}}>
                        <div style={{display:"flex",gap:8,alignItems:"baseline",marginBottom:3,flexDirection:isOwn?"row-reverse":"row"}}>
                          <span style={{fontWeight:700,fontSize:12.5,color:isOwn?"#a89eff":profiles[msg.user_id]?.avatar_color||"#94a3b8"}}>{msg.username}</span>
                          <span style={{fontSize:10,color:"#475569",fontFamily:"'JetBrains Mono',monospace"}}>{timeStr(msg.created_at)}</span>
                        </div>
                        {msg.image_url&&<img src={msg.image_url} className="img-msg" onClick={()=>setLightbox(msg.image_url)} alt="img"/>}
                        {msg.content&&(
                          <div style={{padding:"8px 12px",color:"#f0f4ff",fontSize:14,lineHeight:1.5,wordBreak:"break-word",
                            background:isOwn?"linear-gradient(135deg,rgba(108,99,255,0.3),rgba(79,195,247,0.15))":"rgba(255,255,255,0.05)",
                            border:isOwn?"1px solid rgba(108,99,255,0.35)":"1px solid #1e2d45",
                            borderRadius:isOwn?"14px 4px 14px 14px":"4px 14px 14px 14px",
                            position:"relative"}}>
                            {msg.content}
                          </div>
                        )}
                      </div>
                      {showMenu&&(
                        <div style={{position:"absolute",background:"#111827",border:"1px solid #1e2d45",borderRadius:12,padding:6,zIndex:40,minWidth:130,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",top:0,[isOwn?"right":"left"]:44}}>
                          <button style={{display:"block",width:"100%",background:"none",border:"none",color:"#f0f4ff",fontSize:13,padding:"7px 12px",cursor:"pointer",textAlign:"left",borderRadius:8}} onClick={()=>{setReplyTo(msg);setMsgMenuId(null);}}>↩ Reply</button>
                          {isOwn&&<button style={{display:"block",width:"100%",background:"none",border:"none",color:"#f87171",fontSize:13,padding:"7px 12px",cursor:"pointer",textAlign:"left",borderRadius:8}} onClick={async()=>{await sbFetch(`/messages?id=eq.${msg.id}`,{method:"DELETE",headers:{Authorization:`Bearer ${session.access_token}`}},session.access_token);setMsgMenuId(null);loadMessages();}}>🗑 Delete</button>}
                        </div>
                      )}
                    </div>
                  </React.Fragment>
                );
              })}
              <div ref={bottomRef}/>
            </div>

            {/* Composer */}
            <div style={{padding:"8px 12px 12px",borderTop:"1px solid #1e2d45",background:"rgba(13,18,32,0.95)",flexShrink:0}}>
              <ReplyPreview msg={replyTo?{username:replyTo.username,content:replyTo.content,image_url:replyTo.image_url}:null} onCancel={()=>setReplyTo(null)}/>
              <div style={{display:"flex",gap:8,alignItems:"center",background:"rgba(255,255,255,0.04)",border:"1px solid #243550",borderRadius:16,padding:"6px 6px 6px 12px",transition:"border-color 0.15s"}}
                onFocus={e=>e.currentTarget.style.borderColor="rgba(108,99,255,0.5)"}
                onBlur={e=>e.currentTarget.style.borderColor="#243550"}>
                <button style={{background:"none",border:"none",color:"#64748b",fontSize:19,cursor:"pointer",flexShrink:0,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center"}}
                  onClick={()=>imgRef.current?.click()} disabled={uploadingImg} title="Send image">
                  {uploadingImg?"⏳":"📎"}
                </button>
                <input ref={imgRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImageUpload}/>
                <input ref={inputRef}
                  style={{flex:1,background:"none",border:"none",outline:"none",color:"#f0f4ff",fontSize:14,fontFamily:"'Space Grotesk',sans-serif"}}
                  placeholder={`Message #${currentRoom.label}…`}
                  value={input}
                  onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}}/>
                <button onClick={()=>sendMsg()}
                  style={{width:36,height:36,borderRadius:11,background:"linear-gradient(135deg,#6C63FF,#4FC3F7)",border:"none",color:"#fff",fontSize:16,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",opacity:input.trim()||uploadingImg?1:0.35,transition:"all 0.15s",boxShadow:input.trim()?"0 2px 14px rgba(108,99,255,0.5)":"none"}}
                  disabled={!input.trim()&&!uploadingImg}>↑</button>
              </div>
            </div>
          </>
        )}

        {view==="dms"&&(
          <div style={{flex:1,overflowY:"auto"}}>
            <div style={{padding:"14px 16px 8px",borderBottom:"1px solid #1e2d45"}}>
              <div style={{color:"#94a3b8",fontSize:11,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase"}}>Direct Messages</div>
            </div>
            <ConversationList conversations={conversations} profiles={profiles} myId={session.user.id} onlineUsers={onlineUsers}
              onSelect={(conv,otherId)=>{setCurrentConv(conv);setCurrentDmUser(otherId);setView("dm");}}/>
          </div>
        )}

        {view==="dm"&&currentConv&&(
          <DmChatView conversation={currentConv} otherProfile={profiles[currentDmUser]||{id:currentDmUser,username:"User"}}
            session={session} onBack={()=>setView("dms")} onlineUsers={onlineUsers}/>
        )}

        {view==="profile"&&(
          <div style={{flex:1,overflowY:"auto",padding:20}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <Avatar name={myProfile.username} color={myProfile.avatar_color} url={myProfile.avatar_url} size={80} online={true}/>
            </div>
            <h2 style={{textAlign:"center",fontSize:22,fontWeight:800,color:"#f0f4ff",marginBottom:4}}>{myProfile.username}</h2>
            <div style={{textAlign:"center",color:"#a89eff",fontSize:13,marginBottom:20}}>{myProfile.student_id}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
              {myProfile.university&&myProfile.university!=="Not specified"&&<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid #1e2d45",borderRadius:12,padding:"12px 16px",color:"#94a3b8",fontSize:14}}>🏫 {myProfile.university}</div>}
              {myProfile.department&&<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid #1e2d45",borderRadius:12,padding:"12px 16px",color:"#94a3b8",fontSize:14}}>📚 {myProfile.department}</div>}
              {myProfile.level&&<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid #1e2d45",borderRadius:12,padding:"12px 16px",color:"#94a3b8",fontSize:14}}>🎓 {myProfile.level}</div>}
              {myProfile.role&&<div style={{background:"rgba(108,99,255,0.08)",border:"1px solid rgba(108,99,255,0.2)",borderRadius:12,padding:"12px 16px",color:"#a89eff",fontSize:14}}>🛡 {myProfile.role}</div>}
            </div>
            <button style={BTN} onClick={()=>setView("editProfile")}>✏️ Edit Profile</button>
            <button style={{...BTN,marginTop:10,background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171"}} onClick={handleLogout}>🚪 Sign Out</button>
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      {view!=="editProfile"&&(
        <div style={{display:"flex",borderTop:"1px solid #1e2d45",background:"rgba(13,18,32,0.98)",flexShrink:0,paddingBottom:"env(safe-area-inset-bottom)"}}>
          {[["chat","💬","Chat"],["dms","✉️","DMs"],["profile","👤","Profile"]].map(([v,icon,label])=>(
            <button key={v} onClick={()=>setView(v)}
              style={{flex:1,padding:"10px 0",background:"none",border:"none",color:(view===v||(view==="dm"&&v==="dms"))?"#a89eff":"#475569",fontSize:10,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"'Space Grotesk',sans-serif",transition:"color 0.15s",position:"relative"}}>
              <span style={{fontSize:20}}>{icon}</span>
              {label}
              {(view===v||(view==="dm"&&v==="dms"))&&<span style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,background:"#6C63FF",borderRadius:"2px 2px 0 0"}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── LoginScreen ───────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [mode,setMode]=useState("login");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  async function submit(){
    setLoading(true);setErr("");
    try{
      const data=mode==="login"?await signIn(email,password):await signUp(email,password);
      if(data.access_token)onLogin(data);
      else setErr(data.error?.message||"Check your email to confirm signup.");
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  return(
    <div style={{minHeight:"100dvh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:"20%",left:"50%",transform:"translateX(-50%)",width:300,height:300,background:"radial-gradient(circle,rgba(108,99,255,0.12),transparent 70%)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:380,background:"rgba(17,24,39,0.9)",backdropFilter:"blur(20px)",borderRadius:24,padding:32,border:"1px solid #1e2d45",position:"relative",animation:"slideUp 0.3s ease"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:8}}>🎓</div>
          <h1 style={{color:"#f0f4ff",fontWeight:900,fontSize:28,marginBottom:4}}>CampusHub</h1>
          <p style={{color:"#475569",fontSize:13}}>{mode==="login"?"Welcome back, student":"Join your campus community"}</p>
        </div>
        <input style={INP} type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)}/>
        <input style={INP} type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        {err&&<div style={{color:"#f87171",fontSize:13,marginBottom:12,padding:"8px 12px",background:"rgba(239,68,68,0.1)",borderRadius:8,border:"1px solid rgba(239,68,68,0.2)"}}>{err}</div>}
        <button style={{...BTN,opacity:loading?0.6:1,boxShadow:loading?"none":"0 4px 20px rgba(108,99,255,0.35)"}} onClick={submit} disabled={loading}>
          {loading?"...":(mode==="login"?"Sign In →":"Create Account →")}
        </button>
        <button style={{background:"none",border:"none",color:"#6C63FF",fontSize:13,cursor:"pointer",width:"100%",marginTop:14,textAlign:"center",fontFamily:"'Space Grotesk',sans-serif"}}
          onClick={()=>{setMode(mode==="login"?"signup":"login");setErr("");}}>
          {mode==="login"?"Don't have an account? Sign up":"Already have an account? Sign in"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
