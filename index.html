<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CampusHub</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0e1a; --surface:#11162a; --card:#161d35;
  --border:#22304f; --border2:#2c3c63;
  --accent:#7C5CFF; --accent2:#22D3C4;
  --gold:#FBBF24; --green:#22c55e; --red:#ef4444;
  --text:#f4f6ff; --muted:#5f7099; --muted2:#9aabd1;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);}
input,select,textarea{color:var(--text)!important;font-family:'Space Grotesk',sans-serif;}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:#1e2a3a;color:var(--text);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
body::before{content:'';position:fixed;top:-30vh;left:-20vw;width:80vw;height:80vh;background:radial-gradient(ellipse,rgba(124,92,255,0.10) 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-20vh;right:-10vw;width:60vw;height:60vh;background:radial-gradient(ellipse,rgba(34,211,196,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-4px);opacity:1;}}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.35);}100%{transform:scale(1);}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes glowMove{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.msg-bubble{animation:fadeIn 0.18s ease;}
.reaction-btn:hover{transform:scale(1.2);}
.reaction-btn{transition:transform 0.15s;}
.online-dot{animation:pulse 2s infinite;}
.reaction-pop{animation:pop 0.25s ease;}
.img-msg{max-width:220px;border-radius:14px;cursor:pointer;display:block;margin-top:6px;border:1px solid var(--border);}
.lightbox{position:fixed;inset:0;background:rgba(5,7,15,0.96);z-index:999;display:flex;align-items:center;justify-content:center;}
.lightbox img{max-width:95vw;max-height:90vh;border-radius:12px;}
.bubble-own{background:linear-gradient(135deg,rgba(124,92,255,0.32),rgba(34,211,196,0.16));border:1px solid rgba(124,92,255,0.4);box-shadow:0 2px 12px rgba(124,92,255,0.12);border-radius:16px 4px 16px 16px;}
.bubble-other{background:rgba(255,255,255,0.04);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:4px 16px 16px 16px;}
.room-tab-active{position:relative;}
.room-tab-active::after{content:'';position:absolute;left:14px;right:14px;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;}
.glass-header{background:rgba(10,14,26,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.avatar-ring{padding:2px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:inline-flex;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SUPABASE_URL = "https://vwrqdstapeguqjvlwrps.supabase.co";
const SUPABASE_KEY = "sb_publishable_Irsq6di1d317hycpvsD__A_YTQD60ra";
const CLOUDINARY_CLOUD = "dybylicd7";
const CLOUDINARY_PRESET = "campushub";
const EMOJI_REACTIONS = ["👍","❤️","😂","😮","🔥","🎉"];
const COUNTRY_CODES = [
  {code:"+1",name:"US/Canada"},{code:"+44",name:"UK"},{code:"+234",name:"Nigeria"},
  {code:"+233",name:"Ghana"},{code:"+254",name:"Kenya"},{code:"+27",name:"South Africa"},
  {code:"+256",name:"Uganda"},{code:"+255",name:"Tanzania"},{code:"+91",name:"India"},
  {code:"+92",name:"Pakistan"},{code:"+880",name:"Bangladesh"},{code:"+971",name:"UAE"},
  {code:"+966",name:"Saudi Arabia"},{code:"+20",name:"Egypt"},{code:"+212",name:"Morocco"},
  {code:"+213",name:"Algeria"},{code:"+216",name:"Tunisia"},
  {code:"+260",name:"Zambia"},{code:"+263",name:"Zimbabwe"},{code:"+250",name:"Rwanda"},
  {code:"+61",name:"Australia"},{code:"+64",name:"New Zealand"},{code:"+49",name:"Germany"},
  {code:"+33",name:"France"},{code:"+39",name:"Italy"},{code:"+34",name:"Spain"},
  {code:"+31",name:"Netherlands"},{code:"+86",name:"China"},{code:"+81",name:"Japan"},
  {code:"+82",name:"South Korea"},{code:"+63",name:"Philippines"},{code:"+60",name:"Malaysia"},
  {code:"+65",name:"Singapore"},{code:"+62",name:"Indonesia"},{code:"+90",name:"Turkey"},
  {code:"+55",name:"Brazil"},{code:"+52",name:"Mexico"}
];
function splitPhone(phone){
  if(!phone)return{cc:"+234",num:""};
  const m=COUNTRY_CODES.find(c=>phone.startsWith(c.code));
  if(m)return{cc:m.code,num:phone.slice(m.code.length).replace(/^0+/,"")};
  return{cc:"+234",num:phone.replace(/^\+?0*/,"")};
}

// ── Shared styles ─────────────────────────────────────────────────────────────
const INP = {width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid #22304f",borderRadius:12,padding:"11px 14px",color:"#f4f6ff",fontSize:14,outline:"none",marginBottom:10,display:"block",fontFamily:"'Space Grotesk',sans-serif",transition:"border-color 0.15s, box-shadow 0.15s"};
const BTN = {width:"100%",background:"linear-gradient(135deg,#7C5CFF,#22D3C4)",border:"none",borderRadius:12,padding:13,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"'Sora',sans-serif",letterSpacing:"0.2px",boxShadow:"0 4px 16px rgba(124,92,255,0.25)"};

// ── API helpers ───────────────────────────────────────────────────────────────
async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:"POST",body:fd});
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.secure_url;
}

async function uploadVoiceToCloudinary(blob) {
  const fd = new FormData();
  fd.append("file", blob, "voice.webm");
  fd.append("upload_preset", CLOUDINARY_PRESET);
  fd.append("resource_type", "video");
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/video/upload`,{method:"POST",body:fd});
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return { url: data.secure_url, duration: Math.round(data.duration || 0) };
}

async function sbFetch(path, options={}, token) {
  const authKey = token || SUPABASE_KEY;
  const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
    ...options,
    headers:{
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${authKey}`,
      "Content-Type": "application/json",
      Prefer: "return=representation",
      ...(options.headers||{})
    }
  });
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}
async function signUp(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`,{method:"POST",headers:{apikey:SUPABASE_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password})});
  const data = await res.json();
  if (data.error) throw new Error(data.error.message||"Signup failed");
  return data;
}

async function signIn(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{method:"POST",headers:{apikey:SUPABASE_KEY,"Content-Type":"application/json"},body:JSON.stringify({email,password})});
  const data = await res.json();
  if (data.error||data.error_code) throw new Error(data.error_description||"Login failed");
  return data;
}

// ── DM helpers ────────────────────────────────────────────────────────────────
async function getOrCreateConversation(userId, otherUserId, token) {
  const existing = await sbFetch(`/conversations?or=(and(user1.eq.${userId},user2.eq.${otherUserId}),and(user1.eq.${otherUserId},user2.eq.${userId}))`,{headers:{Authorization:`Bearer ${token}`}},token);
  if (Array.isArray(existing) && existing[0]) return existing[0];
  const created = await sbFetch(`/conversations`,{method:"POST",headers:{Authorization:`Bearer ${token}`},body:JSON.stringify({user1:userId,user2:otherUserId})},token);
  return created[0];
}

async function loadConversations(userId, token) {
  const convs = await sbFetch(`/conversations?or=(user1.eq.${userId},user2.eq.${userId})&order=updated_at.desc`,{headers:{Authorization:`Bearer ${token}`}},token);
  return Array.isArray(convs) ? convs : [];
}

async function loadDmMessages(convId, token) {
  try { return await sbFetch(`/direct_messages?conversation_id=eq.${convId}&order=created_at.asc&limit=100`,{headers:{Authorization:`Bearer ${token}`}},token); }
  catch { return []; }
}

// ── Constants ─────────────────────────────────────────────────────────────────
const ROOMS = [
  {id:"general",label:"general",emoji:"💬"},
  {id:"study",label:"study-group",emoji:"📚"},
  {id:"announcements",label:"announcements",emoji:"📢"},
  {id:"off-topic",label:"off-topic",emoji:"🎮"},
  {id:"assignments",label:"assignments",emoji:"📝"},
];
const LEVELS = ["Jambite (Pre-university)","100L","200L","300L","400L","500L","Graduate"];
const COLORS = ["#7C5CFF","#FF6584","#43B89C","#F4A261","#22D3C4","#FF8A65","#A29BFE"];
const randomColor = () => COLORS[Math.floor(Math.random()*COLORS.length)];
const timeStr = ts => new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const dateStr = ts => {
  const d=new Date(ts),now=new Date();
  if (d.toDateString()===now.toDateString()) return "Today";
  const yest=new Date(now); yest.setDate(yest.getDate()-1);
  if (d.toDateString()===yest.toDateString()) return "Yesterday";
  return d.toLocaleDateString([],{month:"short",day:"numeric"});
};

// ── Avatar ────────────────────────────────────────────────────────────────────
function Avatar({name,color,url,size=36,online=false}){
  const [err,setErr]=useState(false);
  return (
    <div style={{position:"relative",flexShrink:0}}>
      {url&&!err
        ?<img src={url} alt={name} onError={()=>setErr(true)} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:"2px solid #22304f",display:"block"}}/>
        :<div style={{width:size,height:size,borderRadius:"50%",background:color||"#7C5CFF",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:size*0.33}}>{name?.slice(0,2).toUpperCase()}</div>
      }
      {online&&<span className="online-dot" style={{position:"absolute",bottom:1,right:1,width:9,height:9,borderRadius:"50%",background:"#22c55e",border:"2px solid #161d35"}}/>}
    </div>
  );
}

// ── PhotoUploader ─────────────────────────────────────────────────────────────
function PhotoUploader({currentUrl,currentColor,name,onUpload}){
  const [uploading,setUploading]=useState(false);
  const [preview,setPreview]=useState(currentUrl||"");
  const ref=useRef();
  async function handleFile(e){
    const file=e.target.files[0]; if(!file)return;
    setUploading(true);
    try{const url=await uploadToCloudinary(file);setPreview(url);onUpload(url);}
    catch{alert("Upload failed.");}
    setUploading(false);
  }
  return(
    <div style={{textAlign:"center",marginBottom:16}}>
      <div style={{position:"relative",display:"inline-block"}}>
        <Avatar name={name} color={currentColor} url={preview} size={80}/>
        <button style={{position:"absolute",bottom:0,right:0,width:26,height:26,borderRadius:"50%",background:"#7C5CFF",border:"2px solid #161d35",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}
          onClick={()=>ref.current.click()} disabled={uploading}>{uploading?"⏳":"📷"}</button>
      </div>
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
      <div style={{color:"#5f7099",fontSize:11,marginTop:6}}>{uploading?"Uploading...":"Tap 📷 to change photo"}</div>
    </div>
  );
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function Lightbox({url,onClose}){
  useEffect(()=>{const fn=e=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);},[]);
  return(<div className="lightbox" onClick={onClose}><img src={url} onClick={e=>e.stopPropagation()} alt="full"/></div>);
}

// ── ProfileCard ───────────────────────────────────────────────────────────────
function ProfileCard({p,onClose,isOwn,onEdit,online,onMessage}){
  if(!p)return null;
  const wa=p.phone?`https://wa.me/${p.phone.replace(/[^0-9]/g,'')}`:"";
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
      <div style={{background:"#161d35",border:"1px solid #22304f",borderRadius:20,padding:24,width:"100%",maxWidth:320,textAlign:"center",animation:"slideUp 0.2s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><Avatar name={p.username} color={p.avatar_color} url={p.avatar_url} size={80} online={online}/></div>
        <h2 style={{color:"#f4f6ff",fontWeight:800,fontSize:20}}>{p.username}</h2>
        {online&&<div style={{color:"#22c55e",fontSize:12,marginTop:4}}>● Online</div>}
        <div style={{color:"#b4a5ff",fontSize:13,marginTop:4}}>{p.student_id}</div>
        <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:8}}>
          {p.university&&p.university!=="Not specified"&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"8px 14px",color:"#9aabd1",fontSize:13}}>🏫 {p.university}</div>}
          {p.department&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"8px 14px",color:"#9aabd1",fontSize:13}}>📚 {p.department}</div>}
          {p.level&&<div style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"8px 14px",color:"#9aabd1",fontSize:13}}>🎓 {p.level}</div>}
        </div>
        {wa&&<a href={wa} target="_blank" style={{display:"block",marginTop:16,background:"#25D366",borderRadius:10,padding:"10px",color:"#fff",fontSize:14,fontWeight:700,textDecoration:"none"}}>💬 WhatsApp</a>}
        {!isOwn&&<button style={{...BTN,marginTop:10,background:"rgba(108,99,255,0.15)",border:"1px solid rgba(108,99,255,0.3)"}} onClick={()=>onMessage(p.id)}>💬 Send Message</button>}
        {isOwn&&<button style={{...BTN,marginTop:12,background:"rgba(255,255,255,0.05)",border:"1px solid #22304f"}} onClick={()=>{onClose();onEdit();}}>✏️ Edit Profile</button>}
        <button style={{background:"none",border:"none",color:"#64748b",fontSize:13,cursor:"pointer",marginTop:8}} onClick={onClose}>Close</button>
      </div>
    </div>
  );
}

// ── EditProfile ───────────────────────────────────────────────────────────────
function EditProfile({profile,session,onSave,onClose}){
  const [avatarUrl,setAvatarUrl]=useState(profile?.avatar_url||"");
  const [university,setUniversity]=useState(profile?.university||"");
  const [department,setDepartment]=useState(profile?.department||"");
  const [level,setLevel]=useState(profile?.level||"");
  const initPhone=splitPhone(profile?.phone||"");
  const [countryCode,setCountryCode]=useState(initPhone.cc);
  const [phoneNum,setPhoneNum]=useState(initPhone.num);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  async function save(){
    setSaving(true);
    const cleanNum=phoneNum.replace(/[^0-9]/g,"").replace(/^0+/,"");
    const phone=cleanNum?`${countryCode}${cleanNum}`:"";
    try{await sbFetch(`/profiles?id=eq.${profile.id}`,{method:"PATCH",headers:{Authorization:`Bearer ${session.access_token}`},body:JSON.stringify({avatar_url:avatarUrl,university,department,level,phone})},session.access_token);
    onSave({...profile,avatar_url:avatarUrl,university,department,level,phone});}
    catch{setErr("Failed to save. Try again.");}
    setSaving(false);
  }
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
      <div style={{background:"#161d35",border:"1px solid #22304f",borderRadius:20,padding:24,width:"100%",maxWidth:380}}>
        <h2 style={{color:"#f4f6ff",fontWeight:800,fontSize:18,marginBottom:16,textAlign:"center"}}>✏️ Edit Profile</h2>
        <PhotoUploader currentUrl={avatarUrl} currentColor={profile?.avatar_color} name={profile?.username} onUpload={url=>setAvatarUrl(url)}/>
        <label style={{color:"#9aabd1",fontSize:12,marginBottom:4,display:"block"}}>School / University</label>
        <input style={INP} placeholder="University or school name" value={university} onChange={e=>setUniversity(e.target.value)}/>
        <label style={{color:"#9aabd1",fontSize:12,marginBottom:4,display:"block"}}>Department / Course</label>
        <input style={INP} placeholder="Department or course" value={department} onChange={e=>setDepartment(e.target.value)}/>
        <label style={{color:"#9aabd1",fontSize:12,marginBottom:4,display:"block"}}>Level</label>        <select style={{...INP,appearance:"none"}} value={level} onChange={e=>setLevel(e.target.value)}>
          <option value="">Select Level</option>
          {LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
</select>
        <label style={{color:"#9aabd1",fontSize:12,marginBottom:4,display:"block"}}>WhatsApp Number</label>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <select style={{...INP,marginBottom:0,width:110,flexShrink:0,appearance:"none"}} value={countryCode} onChange={e=>setCountryCode(e.target.value)}>
            {COUNTRY_CODES.map(c=><option key={c.code+c.name} value={c.code}>{c.code} {c.name}</option>)}
          </select>
          <input style={{...INP,marginBottom:0,flex:1}} placeholder="8012345678" inputMode="numeric" value={phoneNum} onChange={e=>setPhoneNum(e.target.value.replace(/[^0-9]/g,""))}/>
        </div>
        <div style={{color:"#5f7099",fontSize:11,marginBottom:10,marginTop:-4}}>Enter number without leading 0 — saved as {countryCode}{phoneNum.replace(/^0+/,"")||"…"}</div>
        {err&&<div style={{color:"#f87171",fontSize:13,marginBottom:10}}>{err}</div>}
        <div style={{display:"flex",gap:10}}>
          <button style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid #22304f",borderRadius:10,padding:12,color:"#9aabd1",cursor:"pointer",fontSize:14}} onClick={onClose}>Cancel</button>
          <button style={{flex:1,...BTN,opacity:saving?0.6:1}} onClick={save} disabled={saving}>{saving?"Saving...":"Save Changes"}</button>
        </div>
      </div>
    </div>
  );
}

// ── ReactionBar ───────────────────────────────────────────────────────────────
function ReactionBar({msgId,reactions,userId,onReact}){
  const [open,setOpen]=useState(false);
  const grouped={};
  (reactions||[]).forEach(r=>{grouped[r.emoji]=grouped[r.emoji]||[];grouped[r.emoji].push(r.user_id);});
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4,alignItems:"center"}}>
      {Object.entries(grouped).map(([emoji,users])=>{
        const mine=users.includes(userId);
        return(<button key={emoji} className="reaction-btn" onClick={()=>onReact(msgId,emoji)}
          style={{background:mine?"rgba(108,99,255,0.25)":"rgba(255,255,255,0.05)",border:mine?"1px solid #7C5CFF":"1px solid #22304f",borderRadius:20,padding:"2px 8px",fontSize:13,cursor:"pointer",color:"#e2e8f0",display:"flex",alignItems:"center",gap:4}}>
          {emoji}<span style={{fontSize:11,color:"#9aabd1"}}>{users.length}</span>
        </button>);
      })}
      <button className="reaction-btn" onClick={()=>setOpen(!open)}
        style={{background:"rgba(255,255,255,0.05)",border:"1px solid #22304f",borderRadius:20,padding:"2px 8px",fontSize:13,cursor:"pointer",color:"#64748b"}}>
        {open?"✕":"＋"}
      </button>
      {open&&(
        <div style={{display:"flex",gap:4,background:"#161d35",border:"1px solid #22304f",borderRadius:20,padding:"4px 8px",flexWrap:"wrap"}}>
          {EMOJI_REACTIONS.map(e=>(
            <button key={e} className="reaction-btn" onClick={()=>{onReact(msgId,e);setOpen(false);}}
              style={{background:"none",border:"none",fontSize:18,cursor:"pointer"}}>{e}</button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── ReplyPreview ──────────────────────────────────────────────────────────────
function ReplyPreview({msg,onCancel}){
  if(!msg)return null;
  return(
    <div style={{background:"rgba(108,99,255,0.08)",borderLeft:"3px solid #7C5CFF",borderRadius:"0 8px 8px 0",padding:"6px 10px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{color:"#b4a5ff",fontSize:11,fontWeight:700}}>↩ Replying to {msg.username}</div>
        <div style={{color:"#64748b",fontSize:12,marginTop:2,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",maxWidth:240}}>
          {msg.image_url?"📷 Photo":msg.content}
        </div>
      </div>
      <button onClick={onCancel} style={{background:"none",border:"none",color:"#64748b",fontSize:18,cursor:"pointer",paddingLeft:8}}>✕</button>
    </div>
  );
}

// ── DateDivider ───────────────────────────────────────────────────────────────
function DateDivider({label}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"10px 0"}}>
      <div style={{flex:1,height:1,background:"#22304f"}}/>
      <span style={{color:"#5f7099",fontSize:11,fontWeight:600,whiteSpace:"nowrap",background:"#0a0e1a",padding:"0 8px"}}>{label}</span>
      <div style={{flex:1,height:1,background:"#22304f"}}/>
    </div>
  );
}

// ── TypingIndicator ───────────────────────────────────────────────────────────
function TypingIndicator({typers}){
  if(!typers||typers.length===0)return null;
  const names=typers.slice(0,2).join(", ");
  const extra=typers.length>2?` +${typers.length-2}`:"";
  return(
    <div style={{color:"#64748b",fontSize:12,padding:"0 16px 6px",display:"flex",alignItems:"center",gap:6}}>
      <span style={{display:"inline-flex",gap:3}}>
        {[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:"#5f7099",display:"inline-block",animation:`bounce ${0.8+i*0.2}s ${i*0.15}s infinite`}}/>)}
      </span>
      <span>{names}{extra} typing…</span>
    </div>
  );
}

// ── ConversationList ──────────────────────────────────────────────────────────
function ConversationList({conversations,profiles,myId,onlineUsers,onSelect}){
  if(!conversations.length)return(
    <div style={{color:"#5f7099",textAlign:"center",marginTop:60,padding:16}}>
      <div style={{fontSize:40,marginBottom:12}}>💬</div>
      <div style={{fontWeight:600,color:"#9aabd1",marginBottom:6}}>No conversations yet</div>
      <div style={{fontSize:13}}>Start a DM from someone's profile!</div>
    </div>
  );
  return(
    <div style={{display:"flex",flexDirection:"column"}}>
      {conversations.map(conv=>{
        const otherId=conv.user1_id===myId?conv.user2_id:conv.user1_id;
        const p=profiles[otherId]||{username:"Unknown"};
        const isOnline=!!onlineUsers[otherId];
        return(
<button key={conv.id} onClick={()=>onSelect(conv,otherId)}
            style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:"none",border:"none",borderBottom:"1px solid #22304f",cursor:"pointer",textAlign:"left",width:"100%",transition:"background 0.1s"}}
            onMouseOver={e=>e.currentTarget.style.background="rgba(255,255,255,0.03)"}
            onMouseOut={e=>e.currentTarget.style.background="none"}>
            <Avatar name={p.username} color={p.avatar_color} url={p.avatar_url} size={44} online={isOnline}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:"#f4f6ff",fontWeight:700,fontSize:14}}>{p.username}</div>
              <div style={{color:isOnline?"#22c55e":"#5f7099",fontSize:12,marginTop:2}}>{isOnline?"● Online":"● Offline"}</div>
            </div>
            <span style={{color:"#5f7099",fontSize:18}}>›</span>
          </button>
        );
      })}
    </div>
  );
}

function isOwnMsg(msg,myId){return msg.sender_id===myId;}

// ── DmChatView ────────────────────────────────────────────────────────────────
function DmChatView({conversation,otherProfile,session,onBack,onlineUsers}){
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");  const [sending,setSending]=useState(false);
  const [replyTo,setReplyTo]=useState(null);
  const [uploadingImg,setUploadingImg]=useState(false);
  const [otherTyping,setOtherTyping]=useState(false);
  const [lightbox,setLightbox]=useState(null);
  const [msgMenuId,setMsgMenuId]=useState(null);
  const [editingDmId,setEditingDmId]=useState(null);
  const [editingDmContent,setEditingDmContent]=useState("");
  const bottomRef=useRef(null);
  const pollRef=useRef(null);
  const typingRef=useRef(null);
  const imgRef=useRef();
  const myId=session.user.id;
  const token=session.access_token;
  const isOnline=!!onlineUsers[otherProfile.id];

  async function sendVoiceDm(voiceUrl, duration){
    setSending(true);
    try{await sendDirectMessage(conversation.id,myId,null,null,voiceUrl,"voice",token);await load();}catch{}
    setSending(false);
  }
  const dmVoice=useVoiceRecorder(sendVoiceDm);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);
  useEffect(()=>{
    load(); markDmRead(conversation.id,myId,token);
    clearInterval(pollRef.current);
    pollRef.current=setInterval(()=>{load();markDmRead(conversation.id,myId,token);loadDmTypers(conversation.id,myId,token).then(setOtherTyping);},3000);
    return()=>clearInterval(pollRef.current);
  },[conversation.id]);

  async function load(){const d=await loadDirectMessages(conversation.id,token);setMessages(d);}
  function handleInputChange(e){setInput(e.target.value);clearTimeout(typingRef.current);broadcastDmTyping(conversation.id,myId,token);typingRef.current=setTimeout(()=>{},4000);}
  async function send(mediaUrl=null,mediaType=null){
    if(!mediaUrl&&!input.trim())return;
    setSending(true);
    try{await sendDirectMessage(conversation.id,myId,mediaUrl?null:input.trim(),replyTo?.id||null,mediaUrl,mediaType,token);setInput("");setReplyTo(null);await load();}catch{}
    setSending(false);
  }
  async function handleImageSend(e){
    const file=e.target.files[0];if(!file)return;
    setUploadingImg(true);
    try{const url=await uploadToCloudinary(file);await send(url,"image");}catch{alert("Image upload failed.");}
    setUploadingImg(false);e.target.value="";
  }
  async function editMessage(msgId,newContent){
    try{await sbFetch(`/direct_messages?id=eq.${msgId}`,{method:"PATCH",headers:{Authorization:`Bearer ${token}`},body:JSON.stringify({content:newContent,edited_at:new Date().toISOString()})},token);await load();}catch{}
  }
  async function deleteDm(msgId){
    try{await sbFetch(`/direct_messages?id=eq.${msgId}`,{method:"DELETE",headers:{Authorization:`Bearer ${token}`}},token);setMsgMenuId(null);await load();}catch{}
  }

  const grouped=[];let lastDate=null;
  messages.forEach(msg=>{const d=dateStr(msg.created_at);if(d!==lastDate){grouped.push({type:"divider",label:d});lastDate=d;}grouped.push({type:"msg",msg});});
return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}} onClick={()=>{if(msgMenuId)setMsgMenuId(null);}}>
      {lightbox&&<Lightbox url={lightbox} onClose={()=>setLightbox(null)}/>}
      <div style={{padding:"12px 16px",borderBottom:"1px solid #22304f",background:"rgba(13,18,32,0.9)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <button style={{background:"rgba(255,255,255,0.05)",border:"1px solid #22304f",borderRadius:10,color:"#9aabd1",fontSize:16,cursor:"pointer",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onBack}>←</button>
        <Avatar name={otherProfile.username} color={otherProfile.avatar_color} url={otherProfile.avatar_url} size={36} online={isOnline}/>
        <div style={{flex:1}}>
          <div style={{color:"#f4f6ff",fontWeight:700,fontSize:14}}>{otherProfile.username}</div>
          <div style={{color:isOnline?"#22c55e":"#5f7099",fontSize:11}}>{isOnline?"● Online":"● Offline"}</div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:2}}>
        {messages.length===0&&<div style={{color:"#5f7099",textAlign:"center",marginTop:60}}>
          <div style={{fontSize:36,marginBottom:10}}>👋</div>
          <div style={{fontSize:14,color:"#9aabd1"}}>No messages yet — say hello!</div>
        </div>}
        {grouped.map((item,idx)=>{
          if(item.type==="divider")return<DateDivider key={`d-${idx}`} label={item.label}/>;
          const{msg}=item;
          const isOwn=msg.sender_id===myId;
          const showMenu=msgMenuId===msg.id;
          const isRead=isOwn&&!!msg.read_at;
          return(
            <div key={msg.id} className="msg-bubble" style={{display:"flex",alignItems:"flex-start",gap:10,flexDirection:isOwn?"row-reverse":"row",marginBottom:2,position:"relative"}}>
              <div style={{maxWidth:"72%",display:"flex",flexDirection:"column",alignItems:isOwn?"flex-end":"flex-start"}}>
                {msg.reply_to&&(
                  <div style={{background:"rgba(108,99,255,0.08)",borderLeft:"3px solid #7C5CFF",borderRadius:"0 8px 8px 0",padding:"4px 10px",marginBottom:4,maxWidth:"100%"}}>
                    <div style={{color:"#b4a5ff",fontSize:10,fontWeight:700}}>↩ Reply</div>
                  </div>
                )}
                {editingDmId===msg.id?(
                  <div style={{width:"100%"}}>
                    <textarea value={editingDmContent} onChange={e=>setEditingDmContent(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();editMessage(msg.id,editingDmContent.trim());setEditingDmId(null);}if(e.key==="Escape"){setEditingDmId(null);}}}
                      autoFocus
                      style={{width:"100%",background:"rgba(124,92,255,0.12)",border:"1px solid #7C5CFF",borderRadius:12,padding:"9px 13px",color:"#f4f6ff",fontSize:14,lineHeight:1.5,fontFamily:"'Space Grotesk',sans-serif",resize:"none",outline:"none",minHeight:60,boxShadow:"0 0 0 3px rgba(124,92,255,0.15)"}}/>
                    <div style={{display:"flex",gap:8,marginTop:6,justifyContent:"flex-end"}}>
                      <button onClick={()=>setEditingDmId(null)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid #22304f",borderRadius:8,color:"#9aabd1",fontSize:12,padding:"5px 12px",cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif"}}>Cancel</button>
                      <button onClick={()=>{editMessage(msg.id,editingDmContent.trim());setEditingDmId(null);}} style={{background:"linear-gradient(135deg,#7C5CFF,#22D3C4)",border:"none",borderRadius:8,color:"#fff",fontSize:12,fontWeight:700,padding:"5px 14px",cursor:"pointer",fontFamily:"'Sora',sans-serif"}}>Save</button>
                    </div>
                    <div style={{color:"#5f7099",fontSize:10,marginTop:4,textAlign:"right"}}>Enter to save · Esc to cancel</div>
                  </div>
                ):(
                  <>
                    <div onContextMenu={e=>{e.preventDefault();setMsgMenuId(msg.id);}}
                      onTouchStart={()=>{const t=setTimeout(()=>setMsgMenuId(msg.id),600);return()=>clearTimeout(t);}}
                      style={{padding:msg.media_url?"4px":"9px 13px",color:"#f4f6ff",fontSize:14,lineHeight:1.5,wordBreak:"break-word",
                        background:isOwn?"linear-gradient(135deg,#7C5CFF,#5b54e8)":"rgba(255,255,255,0.06)",
                        border:isOwn?"none":"1px solid #22304f",
                        borderRadius:isOwn?"18px 18px 4px 18px":"18px 18px 18px 4px",cursor:"default"}}>
                      {msg.media_url&&msg.media_type==="image"&&<img src={msg.media_url} className="img-msg" onClick={()=>setLightbox(msg.media_url)} alt="shared"/>}
                      {msg.media_url&&msg.media_type==="voice"&&<VoicePlayer url={msg.media_url} duration={msg.voice_duration||0}/>}
                      {msg.content&&<span>{msg.content}</span>}
                    </div>
                    <span style={{color:"#5f7099",fontSize:10,marginTop:3,display:"flex",gap:4,alignItems:"center"}}>
                      {timeStr(msg.created_at)}
                      {msg.edited_at&&<span style={{color:"#7C5CFF",fontStyle:"italic",fontSize:10}}>(edited)</span>}
                      {isOwn&&<span style={{color:isRead?"#22D3C4":"#5f7099"}}>{isRead?"✓✓":"✓"}</span>}
                    </span>
                  </>
                )}
              </div>
              {showMenu&&(
                <div style={{position:"absolute",[isOwn?"right":"left"]:0,top:0,background:"#161d35",border:"1px solid #22304f",borderRadius:12,padding:6,zIndex:40,minWidth:130,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
                  <button style={{display:"block",width:"100%",background:"none",border:"none",color:"#f4f6ff",fontSize:13,padding:"7px 12px",cursor:"pointer",textAlign:"left",borderRadius:8}} onClick={()=>{setReplyTo(msg);setMsgMenuId(null);}}>↩ Reply</button>
                  {isOwn&&msg.media_type!=="image"&&<button style={{display:"block",width:"100%",background:"none",border:"none",color:"#f4f6ff",fontSize:13,padding:"7px 12px",cursor:"pointer",textAlign:"left",borderRadius:8}} onClick={()=>{setEditingDmId(msg.id);setEditingDmContent(msg.content||"");setMsgMenuId(null);}}>✏️ Edit</button>}
                  {isOwn&&<button style={{display:"block",width:"100%",background:"none",border:"none",color:"#f87171",fontSize:13,padding:"7px 12px",cursor:"pointer",textAlign:"left",borderRadius:8}} onClick={()=>deleteDm(msg.id)}>🗑 Delete</button>}
                </div>
              )}
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      {otherTyping&&<div style={{color:"#64748b",fontSize:12,padding:"0 16px 6px",display:"flex",alignItems:"center",gap:6}}>
        <span style={{display:"inline-flex",gap:3}}>{[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:"#5f7099",display:"inline-block",animation:`bounce ${0.8+i*0.15}s ${i*0.15}s infinite`}}/>)}</span>
        <span>{otherProfile.username} is typing…</span>
      </div>}
      {/* DM Composer */}
      <div style={{padding:"10px 12px 14px",borderTop:"1px solid #22304f",background:"rgba(13,18,32,0.9)",flexShrink:0}}>        <ReplyPreview msg={replyTo?{username:isOwnMsg(replyTo,myId)?"You":otherProfile.username,content:replyTo.content,image_url:replyTo.media_url}:null} onCancel={()=>setReplyTo(null)}/>
        <div style={{display:"flex",gap:8,alignItems:"center",background:"rgba(255,255,255,0.04)",border:"1px solid #22304f",borderRadius:16,padding:"6px 6px 6px 12px"}}>
          <button style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",width:32,height:32}} onClick={()=>imgRef.current.click()} disabled={uploadingImg}>{uploadingImg?"⏳":"📎"}</button>
          <input ref={imgRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImageSend}/>
          <input style={{flex:1,background:"none",border:"none",outline:"none",color:"#f4f6ff",fontSize:14,fontFamily:"'Space Grotesk',sans-serif"}}
            placeholder={dmVoice.recording?"Recording…":`Message ${otherProfile.username}...`} value={input}
            onChange={handleInputChange}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}/>
          <button
            onTouchStart={e=>{e.preventDefault();dmVoice.start();}}
            onTouchEnd={e=>{e.preventDefault();dmVoice.stop();}}
            onMouseDown={e=>{e.preventDefault();dmVoice.start();}}
            onMouseUp={e=>{e.preventDefault();dmVoice.stop();}}
            onMouseLeave={()=>{if(dmVoice.recording)dmVoice.stop();}}
            disabled={dmVoice.uploading}
            title="Hold to record voice note"
            style={{width:34,height:34,borderRadius:11,background:dmVoice.recording?"linear-gradient(135deg,#ef4444,#f97316)":dmVoice.uploading?"rgba(124,92,255,0.3)":"rgba(255,255,255,0.05)",border:dmVoice.recording?"none":"1px solid #22304f",color:"#fff",fontSize:15,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",boxShadow:dmVoice.recording?"0 0 14px rgba(239,68,68,0.5)":"none"}}>
            {dmVoice.uploading?"⏳":dmVoice.recording?"⏹":"🎙"}
          </button> 
          <button style={{width:36,height:36,borderRadius:11,background:"linear-gradient(135deg,#7C5CFF,#22D3C4)",border:"none",color:"#fff",fontSize:16,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",opacity:(input.trim()||uploadingImg)&&!sending?1:0.35,transition:"all 0.15s",boxShadow:(input.trim()||uploadingImg)&&!sending?"0 2px 12px rgba(108,99,255,0.4)":"none"}}
            onClick={()=>send()} disabled={(!input.trim()&&!uploadingImg)||sending}>↑</button>
        </div>
      </div>
    </div>
  );
}

// ── GlobalSearch ──────────────────────────────────────────────────────────────
function GlobalSearch({session,profile,profiles,onClose,onOpenDm,onSwitchRoom}){
  const [query,setQuery]=useState("");
  const [tab,setTab]=useState("messages");
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const inputRef=useRef();
  const debounceRef=useRef();

  useEffect(()=>{inputRef.current?.focus();},[]);
  useEffect(()=>{
    clearTimeout(debounceRef.current);
    if(!query.trim()){setResults([]);return;}
    debounceRef.current=setTimeout(()=>runSearch(query.trim()),350);
  },[query,tab]);

  async function runSearch(q){
    setLoading(true);
    try{
      if(tab==="messages"){
        const joinFilter=profile?.created_at?`&created_at=gte.${encodeURIComponent(profile.created_at)}`:"";
        const d=await sbFetch(`/messages?content=ilike.*${encodeURIComponent(q)}*${joinFilter}&limit=20&order=created_at.desc&select=id,content,created_at,username,room,image_url`,{},session.access_token);
        setResults(Array.isArray(d)?d:[]);
      } else if(tab==="users"){
        const d=await sbFetch(`/profiles?username=ilike.*${encodeURIComponent(q)}*&limit=15&select=id,username,avatar_url,avatar_color,department,university,level`,{},session.access_token);
        setResults(Array.isArray(d)?d:[]);
      } else {
        setResults(ROOMS.filter(r=>r.label.includes(q.toLowerCase())||r.id.includes(q.toLowerCase())));
      }
    }catch{setResults([]);}
    setLoading(false);
  }

  function highlight(text,q){
    if(!text||!q)return text;
    const parts=text.split(new RegExp(`(${q})`, "gi"));
    return parts.map((p,i)=>p.toLowerCase()===q.toLowerCase()?<mark key={i} style={{background:"rgba(108,99,255,0.3)",color:"#c4b5fd",borderRadius:3,padding:"0 2px"}}>{p}</mark>:p);
  }

  const TABS=[{id:"messages",label:"💬 Messages"},{id:"users",label:"👤 People"},{id:"rooms",label:"# Rooms"}];

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"16px 16px 0"}} onClick={onClose}>
      <div style={{background:"#11162a",border:"1px solid #22304f",borderRadius:20,width:"100%",maxWidth:540,maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden",animation:"slideUp 0.2s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"14px 14px 0"}}>
          <div style={{display:"flex",gap:10,alignItems:"center",background:"rgba(255,255,255,0.05)",border:"1px solid #22304f",borderRadius:12,padding:"10px 14px",marginBottom:12}}>
            <span style={{fontSize:16}}>🔍</span>
            <input ref={inputRef} style={{flex:1,background:"none",border:"none",outline:"none",color:"#f4f6ff",fontSize:15,fontFamily:"'Space Grotesk',sans-serif"}} placeholder="Search CampusHub…" value={query} onChange={e=>setQuery(e.target.value)}/>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>
          </div>
          <div style={{display:"flex",borderBottom:"1px solid #22304f"}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>{setTab(t.id);setResults([]);if(query.trim())runSearch(query.trim());}}
                style={{flex:1,padding:"10px 0",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:"transparent",color:tab===t.id?"#b4a5ff":"#5f7099",borderBottom:tab===t.id?"2px solid #7C5CFF":"2px solid transparent",fontFamily:"'Space Grotesk',sans-serif"}}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {!query.trim()&&<div style={{color:"#5f7099",textAlign:"center",padding:"40px 16px",fontSize:13}}>Start typing to search across CampusHub</div>}
          {loading&&<div style={{color:"#5f7099",textAlign:"center",padding:"30px 16px",fontSize:13}}>Searching…</div>}
          {!loading&&query.trim()&&results.length===0&&<div style={{color:"#5f7099",textAlign:"center",padding:"40px 16px",fontSize:13}}>No results for "{query}"</div>}
          {tab==="messages"&&results.map(msg=>{
            const rm=ROOMS.find(r=>r.id===msg.room);
            return(<button key={msg.id} onClick={()=>{onSwitchRoom(msg.room);onClose();}}
              style={{display:"block",width:"100%",textAlign:"left",padding:"12px 16px",background:"none",border:"none",borderBottom:"1px solid #22304f",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{color:"#7C5CFF",fontSize:11,fontWeight:700}}>{rm?`${rm.emoji} #${rm.label}`:msg.room}</span>
                <span style={{color:"#5f7099",fontSize:10,marginLeft:"auto"}}>{timeStr(msg.created_at)}</span>
              </div>
              <div style={{color:"#9aabd1",fontSize:12,fontWeight:700,marginBottom:2}}>{msg.username}</div>
              <div style={{color:"#cbd5e1",fontSize:13,lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
                {msg.image_url?"📷 Photo":highlight(msg.content,query)}
              </div>
            </button>);
          })}
          {tab==="users"&&results.map(p=>(
            <button key={p.id} onClick={()=>{if(p.id!==session.user.id)onOpenDm(p.id);onClose();}}
              style={{display:"flex",alignItems:"center",gap:12,width:"100%",textAlign:"left",padding:"12px 16px",background:"none",border:"none",borderBottom:"1px solid #22304f",cursor:"pointer"}}>
              <Avatar name={p.username} color={p.avatar_color} url={p.avatar_url} size={40}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:"#f4f6ff",fontWeight:700,fontSize:13}}>{highlight(p.username,query)}</div>
                {p.department&&<div style={{color:"#64748b",fontSize:11}}>{highlight(p.department,query)}</div>}
              </div>
              {p.id!==session.user.id&&<span style={{color:"#5f7099",fontSize:11}}>DM →</span>}
            </button>
          ))}
          {tab==="rooms"&&results.map(room=>(
            <button key={room.id} onClick={()=>{onSwitchRoom(room.id);onClose();}}
              style={{display:"flex",alignItems:"center",gap:14,width:"100%",textAlign:"left",padding:"14px 16px",background:"none",border:"none",borderBottom:"1px solid #22304f",cursor:"pointer"}}>
              <span style={{fontSize:28}}>{room.emoji}</span>
              <div>
                <div style={{color:"#f4f6ff",fontWeight:700,fontSize:14}}>#{highlight(room.label,query)}</div>
                <div style={{color:"#5f7099",fontSize:11}}>Tap to open room</div>
              </div>
              <span style={{color:"#5f7099",fontSize:11,marginLeft:"auto"}}>→</span>
            </button>
          ))}
        </div>

// ── VoicePlayer ───────────────────────────────────────────────────────────────
function VoicePlayer({url, duration}){
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [currentTime, setCurrentTime] = useState(0);
  const audioRef = useRef(null);

  function togglePlay(){
    if(!audioRef.current) return;
    if(playing){ audioRef.current.pause(); }
    else { audioRef.current.play(); }
    setPlaying(p=>!p);
  }
  function onTimeUpdate(){
    if(!audioRef.current) return;
    const dur = audioRef.current.duration || duration || 1;
    setCurrentTime(Math.floor(audioRef.current.currentTime));
    setProgress((audioRef.current.currentTime/dur)*100);
  }
  function onEnded(){ setPlaying(false); setProgress(0); setCurrentTime(0); }
  function fmtTime(s){ return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}` }

  return(
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:14,background:"rgba(124,92,255,0.10)",border:"1px solid rgba(124,92,255,0.25)",minWidth:190,maxWidth:260}}>
      <audio ref={audioRef} src={url} onTimeUpdate={onTimeUpdate} onEnded={onEnded} preload="metadata"/>
      <button onClick={togglePlay} style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#7C5CFF,#22D3C4)",border:"none",color:"#fff",fontSize:15,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 10px rgba(124,92,255,0.35)"}}>
        {playing?"⏸":"▶"}
      </button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{height:3,background:"rgba(255,255,255,0.1)",borderRadius:3,overflow:"hidden",marginBottom:5}}>
          <div style={{height:"100%",width:`${progress}%`,background:"linear-gradient(90deg,#7C5CFF,#22D3C4)",borderRadius:3,transition:"width 0.1s linear"}}/>
        </div>
        <span style={{color:"#9aabd1",fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>
          {playing ? fmtTime(currentTime) : fmtTime(duration||0)}
        </span>
      </div>
      <span style={{fontSize:16,flexShrink:0}}>🎙</span>
    </div>
  );
}

// ── useVoiceRecorder ──────────────────────────────────────────────────────────
function useVoiceRecorder(onDone){
  const [recording, setRecording] = useState(false);
  const [uploading, setUploading] = useState(false);
  const mediaRef = useRef(null);
  const chunksRef = useRef([]);
  const startRef = useRef(null);

  async function start(){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      chunksRef.current = [];
      const mr = new MediaRecorder(stream, {mimeType: MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":"audio/webm"});
      mr.ondataavailable = e => { if(e.data.size>0) chunksRef.current.push(e.data); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t=>t.stop());
        const blob = new Blob(chunksRef.current, {type:"audio/webm"});
        const secs = Math.round((Date.now()-startRef.current)/1000);
        setUploading(true);
        try{ const {url,duration} = await uploadVoiceToCloudinary(blob); onDone(url, duration||secs); }
        catch{ alert("Voice upload failed. Check Cloudinary preset allows video uploads."); }
        setUploading(false);
      };
      mediaRef.current = mr;
      startRef.current = Date.now();
      mr.start();
      setRecording(true);
    } catch(e){ alert("Microphone access denied."); }
  }

  function stop(){
    if(mediaRef.current && mediaRef.current.state!=="inactive"){ mediaRef.current.stop(); }
    setRecording(false);
  }

  return { recording, uploading, start, stop };
}

              <div ref={bottomRef}/>
            </div>

            {/* Composer */}            <div style={{padding:"8px 12px 12px",borderTop:"1px solid #22304f",background:"rgba(10,14,26,0.92)",backdropFilter:"blur(12px)",flexShrink:0}}>
              <ReplyPreview msg={replyTo?{username:replyTo.username,content:replyTo.content,image_url:replyTo.image_url}:null} onCancel={()=>setReplyTo(null)}/>
              <div style={{display:"flex",gap:8,alignItems:"center",background:"rgba(255,255,255,0.04)",border:"1px solid #2c3c63",borderRadius:18,padding:"6px 6px 6px 14px",transition:"border-color 0.15s, box-shadow 0.15s"}}
                onFocus={e=>{e.currentTarget.style.borderColor="#7C5CFF";e.currentTarget.style.boxShadow="0 0 0 3px rgba(124,92,255,0.15)";}}
                onBlur={e=>{e.currentTarget.style.borderColor="#2c3c63";e.currentTarget.style.boxShadow="none";}}>
                <button style={{background:"none",border:"none",color:"#5f7099",fontSize:19,cursor:"pointer",flexShrink:0,width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center"}}
                  onClick={()=>imgRef.current?.click()} disabled={uploadingImg} title="Send image">
                  {uploadingImg?"⏳":"📎"}
                </button>
                <input ref={imgRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImageUpload}/>
                <input ref={inputRef}
                  style={{flex:1,background:"none",border:"none",outline:"none",color:"#f4f6ff",fontSize:14,fontFamily:"'Space Grotesk',sans-serif"}}
                  placeholder={roomVoice.recording?"Recording…":`Message #${currentRoom.label}…`}
                  value={input}
                  onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}}/>
                <button
                  onTouchStart={e=>{e.preventDefault();roomVoice.start();}}
                  onTouchEnd={e=>{e.preventDefault();roomVoice.stop();}}
                  onMouseDown={e=>{e.preventDefault();roomVoice.start();}}
                  onMouseUp={e=>{e.preventDefault();roomVoice.stop();}}
                  onMouseLeave={()=>{if(roomVoice.recording)roomVoice.stop();}}
                  disabled={roomVoice.uploading}
                  title="Hold to record voice note"
                  style={{width:34,height:34,borderRadius:11,background:roomVoice.recording?"linear-gradient(135deg,#ef4444,#f97316)":roomVoice.uploading?"rgba(124,92,255,0.3)":"rgba(255,255,255,0.05)",border:roomVoice.recording?"none":"1px solid #22304f",color:"#fff",fontSize:15,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",boxShadow:roomVoice.recording?"0 0 14px rgba(239,68,68,0.5)":"none"}}>
                  {roomVoice.uploading?"⏳":roomVoice.recording?"⏹":"🎙"}
                </button>
                <button onClick={()=>sendMsg()}
                  style={{width:36,height:36,borderRadius:12,background:"linear-gradient(135deg,#7C5CFF,#22D3C4)",border:"none",color:"#fff",fontSize:16,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",opacity:input.trim()||uploadingImg?1:0.35,transition:"all 0.15s",boxShadow:input.trim()?"0 2px 14px rgba(124,92,255,0.45)":"none"}}
disabled={!input.trim()&&!uploadingImg}>↑</button>
              </div>
            </div>
          </>
        )}

        {view==="dms"&&(
          <div style={{flex:1,overflowY:"auto"}}>
            <div style={{padding:"14px 16px 8px",borderBottom:"1px solid #22304f"}}>
              <div style={{color:"#9aabd1",fontSize:11,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase"}}>Direct Messages</div>
            </div>
            <ConversationList conversations={conversations} profiles={profiles} myId={session.user.id} onlineUsers={onlineUsers}
              onSelect={(conv,otherId)=>{setCurrentConv(conv);setCurrentDmUser(otherId);setView("dm");}}/>
          </div>
        )}

        {view==="dm"&&currentConv&&(
          <DmChatView conversation={currentConv} otherProfile={profiles[currentDmUser]||{id:currentDmUser,username:"User"}}
            session={session} onBack={()=>setView("dms")} onlineUsers={onlineUsers}/>
        )}

        {view==="profile"&&(
          <div style={{flex:1,overflowY:"auto",padding:20}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <Avatar name={myProfile.username} color={myProfile.avatar_color} url={myProfile.avatar_url} size={80} online={true}/>
            </div>
            <h2 style={{textAlign:"center",fontSize:22,fontWeight:800,color:"#f4f6ff",marginBottom:4}}>{myProfile.username}</h2>
            <div style={{textAlign:"center",color:"#b4a5ff",fontSize:13,marginBottom:20}}>{myProfile.student_id}</div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
              {myProfile.university&&myProfile.university!=="Not specified"&&<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid #22304f",borderRadius:12,padding:"12px 16px",color:"#9aabd1",fontSize:14}}>🏫 {myProfile.university}</div>}
              {myProfile.department&&<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid #22304f",borderRadius:12,padding:"12px 16px",color:"#9aabd1",fontSize:14}}>📚 {myProfile.department}</div>}
              {myProfile.level&&<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid #22304f",borderRadius:12,padding:"12px 16px",color:"#9aabd1",fontSize:14}}>🎓 {myProfile.level}</div>}
              {myProfile.role&&<div style={{background:"rgba(108,99,255,0.08)",border:"1px solid rgba(108,99,255,0.2)",borderRadius:12,padding:"12px 16px",color:"#b4a5ff",fontSize:14}}>🛡 {myProfile.role}</div>}
            </div>
            <button style={BTN} onClick={()=>setView("editProfile")}>✏️ Edit Profile</button>
            <button style={{...BTN,marginTop:10,background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171"}} onClick={handleLogout}>🚪 Sign Out</button>
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      {view!=="editProfile"&&(
        <div style={{display:"flex",borderTop:"1px solid #22304f",background:"rgba(13,18,32,0.98)",flexShrink:0,paddingBottom:"env(safe-area-inset-bottom)"}}>
          {[["chat","💬","Chat"],["dms","✉️","DMs"],["profile","👤","Profile"]].map(([v,icon,label])=>(
            <button key={v} onClick={()=>setView(v)}
              style={{flex:1,padding:"10px 0",background:"none",border:"none",color:(view===v||(view==="dm"&&v==="dms"))?"#b4a5ff":"#5f7099",fontSize:10,fontWeight:700,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"'Space Grotesk',sans-serif",transition:"color 0.15s",position:"relative"}}>
              <span style={{fontSize:20}}>{icon}</span>
              {label}
              {(view===v||(view==="dm"&&v==="dms"))&&<span style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,background:"#7C5CFF",borderRadius:"2px 2px 0 0"}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── LoginScreen ───────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [mode,setMode]=useState("login");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  async function submit(){
    setLoading(true);setErr("");
    try{
      const data=mode==="login"?await signIn(email,password):await signUp(email,password);
      if(data.access_token)onLogin(data);
      else setErr(data.error?.message||"Check your email to confirm signup.");
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  return(
    <div style={{minHeight:"100dvh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:"15%",left:"50%",transform:"translateX(-50%)",width:340,height:340,background:"radial-gradient(circle,rgba(124,92,255,0.16),transparent 70%)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",bottom:"10%",right:"10%",width:240,height:240,background:"radial-gradient(circle,rgba(34,211,196,0.12),transparent 70%)",pointerEvents:"none"}}/>
      <div style={{width:"100%",maxWidth:380,background:"rgba(22,29,53,0.55)",backdropFilter:"blur(24px)",borderRadius:28,padding:32,border:"1px solid #22304f",position:"relative",animation:"slideUp 0.3s ease",boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:44,marginBottom:10}}>🎓</div>
          <h1 style={{fontWeight:800,fontSize:30,marginBottom:6,fontFamily:"'Sora',sans-serif",letterSpacing:"-0.5px",background:"linear-gradient(135deg,#cdd6ff,#7C5CFF 50%,#22D3C4)",WebkitBackgroundClip:"text",backgroundClip:"text",color:"transparent"}}>CampusHub</h1>
          <p style={{color:"#5f7099",fontSize:13}}>{mode==="login"?"Welcome back, student":"Join your campus community"}</p>
        </div>
        <input style={INP} type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} onFocus={e=>{e.target.style.borderColor="#7C5CFF";e.target.style.boxShadow="0 0 0 3px rgba(124,92,255,0.15)";}} onBlur={e=>{e.target.style.borderColor="#22304f";e.target.style.boxShadow="none";}}/>
        <input style={INP} type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} onFocus={e=>{e.target.style.borderColor="#7C5CFF";e.target.style.boxShadow="0 0 0 3px rgba(124,92,255,0.15)";}} onBlur={e=>{e.target.style.borderColor="#22304f";e.target.style.boxShadow="none";}}/>
        {err&&<div style={{color:"#f87171",fontSize:13,marginBottom:12,padding:"8px 12px",background:"rgba(239,68,68,0.1)",borderRadius:8,border:"1px solid rgba(239,68,68,0.2)"}}>{err}</div>}
        <button style={{...BTN,opacity:loading?0.6:1,boxShadow:loading?"none":"0 4px 20px rgba(124,92,255,0.35)"}} onClick={submit} disabled={loading}>
          {loading?"...":(mode==="login"?"Sign In →":"Create Account →")}
        </button>
 
       <button style={{background:"none",border:"none",color:"#9d8fff",fontSize:13,cursor:"pointer",width:"100%",marginTop:14,textAlign:"center",fontFamily:"'Space Grotesk',sans-serif"}}
          onClick={()=>{setMode(mode==="login"?"signup":"login");setErr("");}}>
          {mode==="login"?"Don't have an account? Sign up":"Already have an account? Sign in"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</body>
</html>
