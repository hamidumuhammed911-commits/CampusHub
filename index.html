<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusHub</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1520; font-family: sans-serif; }
    input, select { color: #e2e8f0 !important; }
    input::placeholder { color: #64748b; }
    select option { background: #1e2a3a; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d1520; }
    ::-webkit-scrollbar-thumb { background: #2d3f55; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPABASE_URL = "https://vwrqdstapeguqjvlwrps.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Irsq6di1d317hycpvsD__A_YTQD60ra";

    async function sbFetch(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
        ...options,
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json", Prefer: "return=representation", ...(options.headers || {}) },
      });
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    }

    async function signUp(email, password) {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: "POST", headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || "Signup failed");
      return data;
    }

    async function signIn(email, password) {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: "POST", headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (data.error || data.error_code) throw new Error(data.error_description || "Login failed");
      return data;
    }

    async function resetPassword(email) {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
        method: "POST", headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      });
      return await res.json();
    }

    const ROOMS = [
      { id: "general", label: "general", emoji: "💬" },
      { id: "study", label: "study-group", emoji: "📚" },
      { id: "announcements", label: "announcements", emoji: "📢" },
      { id: "off-topic", label: "off-topic", emoji: "🎮" },
      { id: "assignments", label: "assignments", emoji: "📝" },
    ];

    const LEVELS = ["100L", "200L", "300L", "400L", "500L"];
    const COLORS = ["#6C63FF","#FF6584","#43B89C","#F4A261","#4FC3F7","#FF8A65","#A29BFE"];
    const randomColor = () => COLORS[Math.floor(Math.random() * COLORS.length)];
    const timeStr = ts => new Date(ts).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });

    const INP = { width:"100%", background:"#1e2a3a", border:"1px solid #2d3f55", borderRadius:10, padding:"11px 14px", color:"#e2e8f0", fontSize:14, outline:"none", marginBottom:10, display:"block" };
    const BTN = { width:"100%", background:"#6C63FF", border:"none", borderRadius:10, padding:12, color:"#fff", fontWeight:700, fontSize:15, cursor:"pointer" };

    function Avatar({ name, color, size = 36 }) {
      return (
        <div style={{ width:size, height:size, borderRadius:"50%", background: color||"#6C63FF",
          display:"flex", alignItems:"center", justifyContent:"center", color:"#fff",
          fontWeight:700, fontSize: size * 0.33, flexShrink:0 }}>
          {name?.slice(0,2).toUpperCase()}
        </div>
      );
    }

    function ProfileCard({ p, onClose }) {
      if (!p) return null;
      const wa = p.phone ? `https://wa.me/${p.phone.replace(/[^0-9]/g,'')}` : null;
      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}
          onClick={onClose}>
          <div style={{ background:"#111827", border:"1px solid #2d3f55", borderRadius:20, padding:24, width:"100%", maxWidth:320, textAlign:"center" }}
            onClick={e=>e.stopPropagation()}>
            <Avatar name={p.username} color={p.avatar_color} size={72} />
            <h2 style={{ color:"#e2e8f0", fontWeight:800, fontSize:20, marginTop:12 }}>{p.username}</h2>
            <div style={{ color:"#a89eff", fontSize:13, marginTop:4 }}>{p.student_id}</div>
            <div style={{ marginTop:16, display:"flex", flexDirection:"column", gap:8 }}>
              {p.university && <div style={{ background:"#1e2a3a", borderRadius:10, padding:"8px 14px", color:"#94a3b8", fontSize:13 }}>🏫 {p.university}</div>}
              {p.department && <div style={{ background:"#1e2a3a", borderRadius:10, padding:"8px 14px", color:"#94a3b8", fontSize:13 }}>📚 {p.department}</div>}
              {p.level && <div style={{ background:"#1e2a3a", borderRadius:10, padding:"8px 14px", color:"#94a3b8", fontSize:13 }}>🎓 {p.level}</div>}
            </div>
            {wa && <a href={wa} target="_blank" style={{ display:"block", marginTop:16, background:"#25D366", borderRadius:10, padding:"10px", color:"#fff", fontSize:14, fontWeight:700, textDecoration:"none" }}>💬 WhatsApp</a>}
            <button style={{ background:"none", border:"none", color:"#64748b", fontSize:13, cursor:"pointer", marginTop:12 }} onClick={onClose}>Close</button>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("login");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [username, setUsername] = useState("");
      const [studentId, setStudentId] = useState("");
      const [department, setDepartment] = useState("");
      const [level, setLevel] = useState("");
      const [phone, setPhone] = useState("");
      const [university, setUniversity] = useState("");
      const [authErr, setAuthErr] = useState("");
      const [loading, setLoading] = useState(false);
      const [session, setSession] = useState(null);
      const [profile, setProfile] = useState(null);
      const [activeRoom, setActiveRoom] = useState("general");
      const [messages, setMessages] = useState([]);
      const [profiles, setProfiles] = useState({});
      const [input, setInput] = useState("");
      const [sending, setSending] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [viewProfile, setViewProfile] = useState(null);
      const bottomRef = useRef(null);
      const pollRef = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

      useEffect(() => {
        if (!session) return;
        loadMessages();
        clearInterval(pollRef.current);
        pollRef.current = setInterval(loadMessages, 3000);
        return () => clearInterval(pollRef.current);
      }, [activeRoom, session]);

      async function loadMessages() {
        try {
          const data = await sbFetch(`/messages?room=eq.${activeRoom}&order=created_at.asc&limit=50`,
            { headers: { Authorization: `Bearer ${session.access_token}` } });
          setMessages(data);
          // load profiles for all users in messages
          const ids = [...new Set(data.map(m => m.user_id))];
          if (ids.length) {
            const ps = await sbFetch(`/profiles?id=in.(${ids.join(',')})`,
              { headers: { Authorization: `Bearer ${session.access_token}` } });
            const map = {};
            ps.forEach(p => map[p.id] = p);
            setProfiles(map);
          }
        } catch(e) {}
      }

      async function handleSignup() {
        if (!email || !password || !username || !studentId || !department || !level || !phone || !university)
          return setAuthErr("Please fill in all fields.");
        if (password.length < 6) return setAuthErr("Password must be at least 6 characters.");
        setLoading(true); setAuthErr("");
        try {
          const data = await signUp(email, password);
          const userId = data.user?.id;
          if (!userId) throw new Error("Signup incomplete. Try logging in.");
          await sbFetch("/profiles", { method:"POST",
            body: JSON.stringify({ id: userId, username, avatar_color: randomColor(),
              student_id: studentId, department, level, phone, university }) });
          setAuthErr("✅ Account created! Please log in.");
          setScreen("login");
        } catch(e) { setAuthErr(e.message); }
        setLoading(false);
      }

      async function handleLogin() {
        if (!email || !password) return setAuthErr("Enter email and password.");
        setLoading(true); setAuthErr("");
        try {
          const data = await signIn(email, password);
          const ps = await sbFetch(`/profiles?id=eq.${data.user?.id}`,
            { headers: { Authorization: `Bearer ${data.access_token}` } });
          if (!ps.length) throw new Error("Profile not found. Please sign up first.");
          setSession(data); setProfile(ps[0]); setScreen("chat");
        } catch(e) { setAuthErr(e.message); }
        setLoading(false);
      }

      async function handleForgotPassword() {
        if (!email) return setAuthErr("Enter your email first.");
        setLoading(true); setAuthErr("");
        try {
          await resetPassword(email);
          setAuthErr("✅ Password reset email sent!");
        } catch(e) { setAuthErr(e.message); }
        setLoading(false);
      }

      async function sendMessage() {
        if (!input.trim() || !session || !profile) return;
        setSending(true);
        try {
          await sbFetch("/messages", { method:"POST",
            headers: { Authorization: `Bearer ${session.access_token}` },
            body: JSON.stringify({ user_id: session.user.id, username: profile.username,
              avatar_color: profile.avatar_color, room: activeRoom, content: input.trim() }) });
          setInput(""); await loadMessages();
        } catch(e) {}
        setSending(false);
      }

      function logout() {
        setSession(null); setProfile(null); setMessages([]);
        setScreen("login"); setEmail(""); setPassword("");
        clearInterval(pollRef.current);
      }

      if (screen === "forgot") {
        return (
          <div style={{ minHeight:"100vh", background:"#0d1520", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
            <div style={{ background:"#111827", border:"1px solid #1e2d3d", borderRadius:20, padding:"36px 28px", width:"100%", maxWidth:360, textAlign:"center" }}>
              <div style={{ fontSize:44, marginBottom:10 }}>🔐</div>
              <h1 style={{ color:"#e2e8f0", fontWeight:800, fontSize:22, marginBottom:4 }}>Forgot Password</h1>
              <p style={{ color:"#64748b", fontSize:13, marginBottom:24 }}>Enter your email to reset your password</p>
              <input style={INP} placeholder="Email address" value={email} type="email" onChange={e=>setEmail(e.target.value)} />
              {authErr && <div style={{ color: authErr.startsWith("✅") ? "#4ade80" : "#f87171", fontSize:13, marginBottom:10 }}>{authErr}</div>}
              <button style={{ ...BTN, opacity: loading ? 0.6 : 1 }} onClick={handleForgotPassword} disabled={loading}>
                {loading ? "Sending..." : "Send Reset Link"}
              </button>
              <button style={{ background:"none", border:"none", color:"#6C63FF", fontSize:13, cursor:"pointer", marginTop:14 }} onClick={()=>{ setScreen("login"); setAuthErr(""); }}>
                Back to Login
              </button>
            </div>
          </div>
        );
      }

      if (screen !== "chat") {
        const isLogin = screen === "login";
        return (
          <div style={{ minHeight:"100vh", background:"#0d1520", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
            <div style={{ background:"#111827", border:"1px solid #1e2d3d", borderRadius:20, padding:"36px 28px", width:"100%", maxWidth:400, textAlign:"center" }}>
              <div style={{ fontSize:44, marginBottom:10 }}>🎓</div>
              <h1 style={{ color:"#e2e8f0", fontWeight:800, fontSize:24, marginBottom:4 }}>CampusHub</h1>
              <p style={{ color:"#64748b", fontSize:13, marginBottom:24 }}>{isLogin ? "Welcome back 👋" : "Join your campus community"}</p>
              {!isLogin && <input style={INP} placeholder="Full name" value={username} onChange={e=>setUsername(e.target.value)} />}
              <input style={INP} placeholder="Email address" value={email} type="email" onChange={e=>setEmail(e.target.value)} />
              <input style={INP} placeholder="Password (min 6 characters)" value={password} type="password" onChange={e=>setPassword(e.target.value)} />
              {!isLogin && <>
                <input style={INP} placeholder="Student ID (e.g. STU/2024/001)" value={studentId} onChange={e=>setStudentId(e.target.value)} />
                <input style={INP} placeholder="University name" value={university} onChange={e=>setUniversity(e.target.value)} />
                <input style={INP} placeholder="Department / Course" value={department} onChange={e=>setDepartment(e.target.value)} />
                <select style={{ ...INP, appearance:"none" }} value={level} onChange={e=>setLevel(e.target.value)}>
                  <option value="">Select Level</option>
                  {LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
                </select>
                <input style={INP} placeholder="WhatsApp number (e.g. 2348012345678)" value={phone} onChange={e=>setPhone(e.target.value)} />
              </>}
              {authErr && <div style={{ color: authErr.startsWith("✅") ? "#4ade80" : "#f87171", fontSize:13, marginBottom:10 }}>{authErr}</div>}
              <button style={{ ...BTN, opacity: loading ? 0.6 : 1 }} onClick={isLogin ? handleLogin : handleSignup} disabled={loading}>
                {loading ? "Please wait..." : isLogin ? "Log in →" : "Create Account →"}
              </button>
              {isLogin && <button style={{ background:"none", border:"none", color:"#94a3b8", fontSize:13, cursor:"pointer", marginTop:10, display:"block", width:"100%", textAlign:"center" }}
                onClick={()=>{ setScreen("forgot"); setAuthErr(""); }}>Forgot password?</button>}
              <button style={{ background:"none", border:"none", color:"#6C63FF", fontSize:13, cursor:"pointer", marginTop:8 }}
                onClick={()=>{ setScreen(isLogin?"signup":"login"); setAuthErr(""); }}>
                {isLogin ? "No account? Sign up" : "Have an account? Log in"}
              </button>
            </div>
          </div>
        );
      }

      const currentRoom = ROOMS.find(r => r.id === activeRoom);
      return (
        <div style={{ display:"flex", height:"100vh", background:"#0d1520", overflow:"hidden", position:"relative" }}>
          {viewProfile && <ProfileCard p={viewProfile} onClose={()=>setViewProfile(null)} />}
          {sidebarOpen && <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", zIndex:10 }} onClick={()=>setSidebarOpen(false)} />}
          
          <aside style={{ width:240, background:"#111827", display:"flex", flexDirection:"column", borderRight:"1px solid #1e2d3d", position:"fixed", height:"100%", zIndex:20, transform: sidebarOpen ? "translateX(0)" : "translateX(-100%)", transition:"transform 0.2s" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, padding:"16px 16px 12px", borderBottom:"1px solid #1e2d3d" }}>
              <span style={{ fontSize:20 }}>🎓</span>
              <span style={{ color:"#e2e8f0", fontWeight:800, fontSize:15 }}>CampusHub</span>
            </div>
            <div style={{ color:"#475569", fontSize:10, fontWeight:700, letterSpacing:1.2, padding:"14px 16px 6px" }}>ROOMS</div>
            {ROOMS.map(room => (
              <button key={room.id} style={{ display:"block", width:"100%", textAlign:"left", padding:"8px 16px", border:"none", cursor:"pointer", fontSize:13, borderRadius:6, margin:"1px 0",
                background: activeRoom===room.id ? "rgba(108,99,255,0.2)" : "transparent",
                color: activeRoom===room.id ? "#a89eff" : "#94a3b8", fontWeight: activeRoom===room.id ? 700 : 400 }}
                onClick={()=>{ setActiveRoom(room.id); setSidebarOpen(false); }}>
                {room.emoji} {room.label}
              </button>
            ))}

            {/* My Profile */}
            <div style={{ marginTop:"auto", borderTop:"1px solid #1e2d3d" }}>
              <button style={{ width:"100%", background:"none", border:"none", cursor:"pointer", padding:"12px 14px", textAlign:"left" }}
                onClick={()=>{ setViewProfile(profile); setSidebarOpen(false); }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <Avatar name={profile?.username} color={profile?.avatar_color} size={38} />
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ color:"#e2e8f0", fontSize:13, fontWeight:700 }}>{profile?.username}</div>
                    <div style={{ color:"#6C63FF", fontSize:11 }}>{profile?.level} · {profile?.department}</div>
                    <div style={{ color:"#475569", fontSize:10, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{profile?.university}</div>
                  </div>
                  <button style={{ background:"none", border:"none", color:"#475569", cursor:"pointer", fontSize:16, padding:4 }} onClick={e=>{ e.stopPropagation(); logout(); }}>⏻</button>
                </div>
              </button>
            </div>
          </aside>

          <main style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <div style={{ padding:"12px 16px", borderBottom:"1px solid #1e2d3d", background:"#111827", display:"flex", alignItems:"center", gap:12 }}>
              <button style={{ background:"none", border:"none", color:"#94a3b8", fontSize:20, cursor:"pointer" }} onClick={()=>setSidebarOpen(!sidebarOpen)}>☰</button>
              <div>
                <div style={{ color:"#e2e8f0", fontWeight:700, fontSize:14 }}>{currentRoom?.emoji} {currentRoom?.label}</div>
                <div style={{ color:"#475569", fontSize:11 }}>{messages.length} messages</div>
              </div>
            </div>

            <div style={{ flex:1, overflowY:"auto", padding:16, display:"flex", flexDirection:"column", gap:16 }}>
              {messages.length===0 && <div style={{ color:"#475569", textAlign:"center", marginTop:40 }}>No messages yet — say hello! 👋</div>}
              {messages.map(msg => {
                const isOwn = msg.user_id === session?.user?.id;
                const p = profiles[msg.user_id];
                return (
                  <div key={msg.id} style={{ display:"flex", alignItems:"flex-start", gap:10, flexDirection: isOwn?"row-reverse":"row" }}>
                    <button style={{ background:"none", border:"none", cursor:"pointer", padding:0 }}
                      onClick={()=> p && setViewProfile(p)}>
                      <Avatar name={msg.username} color={msg.avatar_color} size={38} />
                    </button>
                    <div style={{ maxWidth:"70%", display:"flex", flexDirection:"column", alignItems: isOwn?"flex-end":"flex-start" }}>
